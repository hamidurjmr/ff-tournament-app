<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FF Tournament | User Panel</title>
    
    <!-- Bootstrap 5 + Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;800&family=Rajdhani:wght@300;400;600&display=swap" rel="stylesheet">
    
    <!-- Animate.css -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Rajdhani', sans-serif;
            background: #0a0f1f;
            color: #fff;
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }

        /* Animated Background */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                radial-gradient(circle at 20% 30%, rgba(0, 255, 255, 0.1) 0%, transparent 30%),
                radial-gradient(circle at 80% 70%, rgba(255, 0, 255, 0.1) 0%, transparent 30%),
                linear-gradient(135deg, #0a0f1f 0%, #1a1f35 100%);
            z-index: -2;
        }

        /* Floating Particles */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
        }

        .particle {
            position: absolute;
            width: 2px;
            height: 2px;
            background: rgba(0, 255, 255, 0.5);
            box-shadow: 0 0 10px cyan;
            border-radius: 50%;
            animation: float 20s infinite linear;
        }

        @keyframes float {
            0% { transform: translateY(100vh) translateX(0); opacity: 1; }
            100% { transform: translateY(-100vh) translateX(100px); opacity: 0; }
        }

        /* Container */
        .app-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        /* Glassmorphism Cards */
        .glass-card {
            background: rgba(20, 30, 50, 0.7);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(0, 255, 255, 0.2);
            border-radius: 30px;
            padding: 25px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
            transition: all 0.4s ease;
            position: relative;
            overflow: hidden;
        }

        .glass-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.1), transparent);
            transition: left 0.7s ease;
        }

        .glass-card:hover::before {
            left: 100%;
        }

        .glass-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 45px rgba(0, 255, 255, 0.3);
            border-color: cyan;
        }

        /* Neon Buttons */
        .btn-neon {
            background: transparent;
            border: 2px solid cyan;
            color: cyan;
            padding: 12px 30px;
            border-radius: 50px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 2px;
            position: relative;
            overflow: hidden;
            transition: all 0.3s;
            z-index: 1;
        }

        .btn-neon::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 0%;
            height: 100%;
            background: cyan;
            transition: width 0.3s;
            z-index: -1;
        }

        .btn-neon:hover::before {
            width: 100%;
        }

        .btn-neon:hover {
            color: #0a0f1f;
            box-shadow: 0 0 20px cyan;
            transform: scale(1.05);
        }

        .btn-gradient {
            background: linear-gradient(45deg, #00ff88, #00ccff);
            border: none;
            color: #0a0f1f;
            font-weight: 700;
            padding: 12px 30px;
            border-radius: 50px;
            box-shadow: 0 5px 20px rgba(0, 255, 255, 0.4);
            transition: all 0.3s;
        }

        .btn-gradient:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 30px rgba(0, 255, 255, 0.8);
        }

        /* Input Fields */
        .input-modern {
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(0, 255, 255, 0.3);
            border-radius: 50px;
            padding: 15px 25px;
            color: white;
            font-size: 16px;
            transition: all 0.3s;
            width: 100%;
        }

        .input-modern:focus {
            outline: none;
            border-color: cyan;
            box-shadow: 0 0 20px cyan;
            background: rgba(255, 255, 255, 0.15);
        }

        /* User Profile Card */
        .profile-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 30px;
            padding: 30px;
            position: relative;
            overflow: hidden;
        }

        .profile-card::after {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, transparent, rgba(255, 255, 255, 0.1), transparent);
            animation: rotate 6s linear infinite;
        }

        @keyframes rotate {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Stats Card */
        .stat-card {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            border-left: 5px solid cyan;
        }

        /* Match Card */
        .match-card {
            background: linear-gradient(145deg, #1e2a3a, #0f1a2a);
            border-radius: 25px;
            padding: 25px;
            position: relative;
            border: 1px solid rgba(0, 255, 255, 0.2);
            transition: all 0.3s;
            cursor: pointer;
        }

        .match-card:hover {
            transform: scale(1.02) translateY(-5px);
            border-color: cyan;
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.3);
        }

        .match-badge {
            position: absolute;
            top: 20px;
            right: 20px;
            background: linear-gradient(45deg, #ff416c, #ff4b2b);
            padding: 5px 15px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 12px;
        }

        /* Loading Spinner */
        .spinner-modern {
            width: 50px;
            height: 50px;
            border: 5px solid rgba(0, 255, 255, 0.1);
            border-top: 5px solid cyan;
            border-right: 5px solid cyan;
            border-radius: 50%;
            animation: spin 1s cubic-bezier(0.68, -0.55, 0.265, 1.55) infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Toast Notification */
        .toast-notification {
            position: fixed;
            top: 20px;
            right: 20px;
            min-width: 300px;
            padding: 20px;
            border-radius: 15px;
            background: rgba(0, 0, 0, 0.9);
            border-left: 5px solid cyan;
            color: white;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            z-index: 9999;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        /* Tabs */
        .auth-tabs {
            display: flex;
            gap: 10px;
            background: rgba(0, 0, 0, 0.3);
            padding: 5px;
            border-radius: 60px;
            margin-bottom: 30px;
        }

        .auth-tab {
            flex: 1;
            padding: 15px;
            text-align: center;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 600;
        }

        .auth-tab.active {
            background: linear-gradient(45deg, cyan, #00ff88);
            color: #0a0f1f;
            box-shadow: 0 5px 20px rgba(0, 255, 255, 0.5);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .app-container { padding: 10px; }
            .glass-card { padding: 15px; }
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #1a1f35;
        }

        ::-webkit-scrollbar-thumb {
            background: linear-gradient(45deg, cyan, #00ff88);
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <!-- Particles Background -->
    <div class="particles" id="particles"></div>

    <div class="app-container">
        <!-- Toast Container -->
        <div id="toastContainer"></div>

        <!-- Loading Overlay -->
        <div id="loadingOverlay" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); backdrop-filter: blur(5px); z-index: 99999; display: none; justify-content: center; align-items: center; flex-direction: column;">
            <div class="spinner-modern" style="width: 80px; height: 80px;"></div>
            <p style="color: cyan; margin-top: 20px; font-size: 18px;">Loading...</p>
        </div>

        <!-- Login/Register Section -->
        <div id="authSection" class="glass-card animate__animated animate__fadeIn" style="max-width: 500px; margin: 50px auto;">
            <div style="text-align: center; margin-bottom: 30px;">
                <i class="bi bi-controller" style="font-size: 60px; color: cyan;"></i>
                <h1 style="font-family: 'Orbitron', sans-serif; background: linear-gradient(45deg, cyan, #00ff88); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">FF TOURNAMENT</h1>
                <p style="color: #aaa;">Join the Battle!</p>
            </div>

            <!-- Tabs -->
            <div class="auth-tabs">
                <div class="auth-tab active" onclick="switchTab('login')" id="loginTab">Login</div>
                <div class="auth-tab" onclick="switchTab('register')" id="registerTab">Register</div>
            </div>

            <!-- Login Form -->
            <div id="loginForm">
                <div class="mb-4">
                    <input type="email" id="loginEmail" class="input-modern" placeholder="Email Address" value="test@test.com">
                </div>
                <div class="mb-4">
                    <input type="password" id="loginPassword" class="input-modern" placeholder="Password" value="123456">
                </div>
                <button class="btn-gradient w-100" onclick="handleLogin()">
                    <i class="bi bi-box-arrow-in-right"></i> Login Now
                </button>
            </div>

            <!-- Register Form -->
            <div id="registerForm" style="display: none;">
                <div class="mb-4">
                    <input type="email" id="regEmail" class="input-modern" placeholder="Email Address">
                </div>
                <div class="mb-4">
                    <input type="password" id="regPassword" class="input-modern" placeholder="Password (min 6 chars)">
                </div>
                <div class="mb-4">
                    <input type="text" id="regReferral" class="input-modern" placeholder="Referral Code (Optional)">
                </div>
                <button class="btn-gradient w-100" onclick="handleRegister()">
                    <i class="bi bi-person-plus"></i> Create Account
                </button>
            </div>

            <p id="authMessage" style="text-align: center; margin-top: 20px; color: #ffaa00;"></p>
        </div>

        <!-- Dashboard Section -->
        <div id="dashboardSection" style="display: none;">
            <!-- Profile Header -->
            <div class="profile-card mb-4 animate__animated animate__fadeInDown">
                <div class="d-flex justify-content-between align-items-center">
                    <div>
                        <h2><i class="bi bi-person-circle"></i> <span id="userEmail">Loading...</span></h2>
                        <p class="mb-0"><i class="bi bi-controller"></i> Game UID: <span id="userGameUid">Not Set</span></p>
                    </div>
                    <button class="btn-neon" onclick="logout()">
                        <i class="bi bi-box-arrow-right"></i> Logout
                    </button>
                </div>
            </div>

            <!-- Stats Cards -->
            <div class="row g-4 mb-4">
                <div class="col-md-4">
                    <div class="stat-card animate__animated animate__fadeInUp">
                        <i class="bi bi-wallet2" style="font-size: 40px; color: #00ff88;"></i>
                        <h3>Wallet</h3>
                        <h2 style="color: #00ff88; font-size: 36px;">₹<span id="walletBalance">0</span></h2>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="stat-card animate__animated animate__fadeInUp" style="animation-delay: 0.2s;">
                        <i class="bi bi-trophy" style="font-size: 40px; color: gold;"></i>
                        <h3>Matches</h3>
                        <h2 style="color: gold;" id="matchesPlayed">0</h2>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="stat-card animate__animated animate__fadeInUp" style="animation-delay: 0.4s;">
                        <i class="bi bi-people" style="font-size: 40px; color: cyan;"></i>
                        <h3>Referrals</h3>
                        <h2 style="color: cyan;" id="referralCount">0</h2>
                    </div>
                </div>
            </div>

            <!-- Action Cards -->
            <div class="row g-4 mb-4">
                <!-- Set UID -->
                <div class="col-md-4">
                    <div class="glass-card">
                        <h4><i class="bi bi-id-card"></i> Set Game UID</h4>
                        <input type="text" id="gameUidInput" class="input-modern mb-3" placeholder="Enter Free Fire UID">
                        <button class="btn-neon w-100" onclick="setGameUid()">Save UID</button>
                    </div>
                </div>

                <!-- Deposit -->
                <div class="col-md-4">
                    <div class="glass-card">
                        <h4><i class="bi bi-arrow-down-circle"></i> Add Funds</h4>
                        <p class="text-info">UPI ID: <strong>uddin6@fam</strong></p>
                        <input type="number" id="depositAmount" class="input-modern mb-2" placeholder="₹10 - ₹500">
                        <input type="text" id="upiRefId" class="input-modern mb-3" placeholder="UPI Reference ID">
                        <button class="btn-gradient w-100" onclick="requestDeposit()">
                            <i class="bi bi-plus-circle"></i> Request Deposit
                        </button>
                    </div>
                </div>

                <!-- Withdraw -->
                <div class="col-md-4">
                    <div class="glass-card">
                        <h4><i class="bi bi-arrow-up-circle"></i> Withdraw</h4>
                        <input type="number" id="withdrawAmount" class="input-modern mb-2" placeholder="Amount">
                        <input type="text" id="withdrawUpi" class="input-modern mb-3" placeholder="Your UPI ID">
                        <button class="btn-neon w-100" onclick="requestWithdraw()">
                            <i class="bi bi-cash"></i> Request Withdrawal
                        </button>
                    </div>
                </div>
            </div>

            <!-- Referral Section -->
            <div class="glass-card mb-4">
                <div class="row align-items-center">
                    <div class="col-md-6">
                        <h4><i class="bi bi-gift"></i> Referral Program</h4>
                        <p>Invite friends and earn ₹20 per referral!</p>
                        <p><strong>Your Referral Code: <span id="referralCode" style="color: cyan;"></span></strong></p>
                    </div>
                    <div class="col-md-6">
                        <div class="d-flex gap-2">
                            <input type="text" id="referralLink" class="input-modern" readonly>
                            <button class="btn-neon" onclick="copyReferral()">Copy</button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Tournaments -->
            <div class="glass-card">
                <h3 class="mb-4"><i class="bi bi-trophy-fill" style="color: gold;"></i> Live Tournaments</h3>
                <div id="matchesContainer" class="row g-4"></div>
            </div>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

    <script>
        // Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyAZcAJNzY8nFZMD7ILuOArGmnjBeRRMgbo",
            authDomain: "ff-tournament-81d64.firebaseapp.com",
            projectId: "ff-tournament-81d64",
            storageBucket: "ff-tournament-81d64.firebasestorage.app",
            messagingSenderId: "171831529957",
            appId: "1:171831529957:web:833981b11c3383a9f49f0c"
        };

        // Initialize
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        // Global Variables
        let currentUser = null;
        let userData = null;

        // Particles Background
        function createParticles() {
            const particlesContainer = document.getElementById('particles');
            for (let i = 0; i < 50; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.animationDelay = Math.random() * 20 + 's';
                particle.style.animationDuration = 15 + Math.random() * 10 + 's';
                particlesContainer.appendChild(particle);
            }
        }
        createParticles();

        // Toast Notification
        function showToast(message, type = 'success') {
            const toast = document.createElement('div');
            toast.className = 'toast-notification';
            toast.innerHTML = `
                <div class="d-flex align-items-center">
                    <i class="bi ${type === 'success' ? 'bi-check-circle-fill text-success' : 'bi-exclamation-circle-fill text-danger'} me-3" style="font-size: 24px;"></i>
                    <div>
                        <strong>${type === 'success' ? 'Success!' : 'Error!'}</strong>
                        <p class="mb-0">${message}</p>
                    </div>
                </div>
            `;
            document.getElementById('toastContainer').appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        // Loading
        function showLoading(show) {
            document.getElementById('loadingOverlay').style.display = show ? 'flex' : 'none';
        }

        // Switch Tabs
        window.switchTab = (tab) => {
            if (tab === 'login') {
                document.getElementById('loginTab').classList.add('active');
                document.getElementById('registerTab').classList.remove('active');
                document.getElementById('loginForm').style.display = 'block';
                document.getElementById('registerForm').style.display = 'none';
            } else {
                document.getElementById('registerTab').classList.add('active');
                document.getElementById('loginTab').classList.remove('active');
                document.getElementById('registerForm').style.display = 'block';
                document.getElementById('loginForm').style.display = 'none';
            }
        };

        // Handle Login
        window.handleLogin = async () => {
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;

            if (!email || !password) {
                showToast('Please fill all fields', 'error');
                return;
            }

            showLoading(true);
            try {
                await auth.signInWithEmailAndPassword(email, password);
                showToast('Login successful! Welcome back!');
            } catch (error) {
                showToast(error.message, 'error');
            } finally {
                showLoading(false);
            }
        };

        // Handle Register
        window.handleRegister = async () => {
            const email = document.getElementById('regEmail').value;
            const password = document.getElementById('regPassword').value;
            const referral = document.getElementById('regReferral').value;

            if (!email || !password) {
                showToast('Please fill all fields', 'error');
                return;
            }

            if (password.length < 6) {
                showToast('Password must be at least 6 characters', 'error');
                return;
            }

            showLoading(true);
            try {
                const result = await auth.createUserWithEmailAndPassword(email, password);
                
                // Generate referral code
                const referralCode = 'FF' + Math.random().toString(36).substring(2, 8).toUpperCase();
                
                // Create user document
                await db.collection('users').doc(result.user.uid).set({
                    email: email,
                    wallet: 20, // Welcome bonus
                    matchesPlayed: 0,
                    gameUID: '',
                    referralCode: referralCode,
                    referredBy: referral || null,
                    referralCount: 0,
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                });

                // If referred, add bonus to referrer
                if (referral) {
                    const referrerQuery = await db.collection('users').where('referralCode', '==', referral).get();
                    if (!referrerQuery.empty) {
                        const referrerDoc = referrerQuery.docs[0];
                        await referrerDoc.ref.update({
                            wallet: firebase.firestore.FieldValue.increment(30),
                            referralCount: firebase.firestore.FieldValue.increment(1)
                        });
                        showToast('Referral bonus applied!', 'success');
                    }
                }

                showToast('Registration successful! ₹20 welcome bonus added!');
            } catch (error) {
                showToast(error.message, 'error');
            } finally {
                showLoading(false);
            }
        };

        // Set Game UID
        window.setGameUid = async () => {
            if (!currentUser) return;
            const uid = document.getElementById('gameUidInput').value;
            
            if (!uid) {
                showToast('Please enter Game UID', 'error');
                return;
            }

            showLoading(true);
            try {
                await db.collection('users').doc(currentUser.uid).update({
                    gameUID: uid
                });
                showToast('Game UID saved successfully!');
                loadUserData();
            } catch (error) {
                showToast(error.message, 'error');
            } finally {
                showLoading(false);
            }
        };

        // Request Deposit
        window.requestDeposit = async () => {
            if (!currentUser) return;
            const amount = parseInt(document.getElementById('depositAmount').value);
            const refId = document.getElementById('upiRefId').value;

            if (!amount || !refId) {
                showToast('Please fill all fields', 'error');
                return;
            }

            if (amount < 10 || amount > 500) {
                showToast('Amount must be between ₹10 and ₹500', 'error');
                return;
            }

            showLoading(true);
            try {
                await db.collection('deposit_requests').add({
                    userId: currentUser.uid,
                    userEmail: currentUser.email,
                    amount: amount,
                    refId: refId,
                    status: 'pending',
                    timestamp: firebase.firestore.FieldValue.serverTimestamp()
                });
                showToast('Deposit request sent to admin! You will be notified once approved.');
                document.getElementById('depositAmount').value = '';
                document.getElementById('upiRefId').value = '';
            } catch (error) {
                showToast(error.message, 'error');
            } finally {
                showLoading(false);
            }
        };

        // Request Withdrawal
        window.requestWithdraw = async () => {
            if (!currentUser || !userData) return;
            const amount = parseInt(document.getElementById('withdrawAmount').value);
            const upi = document.getElementById('withdrawUpi').value;

            if (!amount || !upi) {
                showToast('Please fill all fields', 'error');
                return;
            }

            if (amount > userData.wallet) {
                showToast('Insufficient balance!', 'error');
                return;
            }

            showLoading(true);
            try {
                await db.collection('withdraw_requests').add({
                    userId: currentUser.uid,
                    userEmail: currentUser.email,
                    amount: amount,
                    upiId: upi,
                    status: 'pending',
                    timestamp: firebase.firestore.FieldValue.serverTimestamp()
                });
                showToast('Withdrawal request sent to admin!');
                document.getElementById('withdrawAmount').value = '';
                document.getElementById('withdrawUpi').value = '';
            } catch (error) {
                showToast(error.message, 'error');
            } finally {
                showLoading(false);
            }
        };

        // Join Match
        window.joinMatch = async (matchId, entryFee) => {
            if (!currentUser || !userData) {
                showToast('Please login first', 'error');
                return;
            }

            if (!userData.gameUID) {
                showToast('Please set your Game UID first!', 'error');
                return;
            }

            if (userData.wallet < entryFee) {
                showToast('Insufficient balance! Please add funds.', 'error');
                return;
            }

            showLoading(true);
            try {
                const matchRef = db.collection('matches').doc(matchId);
                const userRef = db.collection('users').doc(currentUser.uid);

                await db.runTransaction(async (transaction) => {
                    const matchDoc = await transaction.get(matchRef);
                    const userDoc = await transaction.get(userRef);

                    if (!matchDoc.exists) throw 'Match not found';
                    if (!userDoc.exists) throw 'User not found';

                    const matchData = matchDoc.data();
                    const userData = userDoc.data();

                    if (userData.wallet < entryFee) throw 'Insufficient balance';
                    if (matchData.players && matchData.players.includes(currentUser.uid)) throw 'Already joined this match';

                    const maxPlayers = matchData.type === '1v1' ? 2 : 4;
                    if (matchData.players && matchData.players.length >= maxPlayers) throw 'Match is full';

                    transaction.update(userRef, {
                        wallet: firebase.firestore.FieldValue.increment(-entryFee)
                    });

                    transaction.update(matchRef, {
                        players: firebase.firestore.FieldValue.arrayUnion(currentUser.uid)
                    });
                });

                showToast('Successfully joined match! Good luck!');
                loadMatches();
                loadUserData();
            } catch (error) {
                showToast(error.toString(), 'error');
            } finally {
                showLoading(false);
            }
        };

        // Copy Referral Link
        window.copyReferral = () => {
            const link = document.getElementById('referralLink');
            link.select();
            document.execCommand('copy');
            showToast('Referral code copied!');
        };

        // Load User Data
        async function loadUserData() {
            if (!currentUser) return;
            
            const doc = await db.collection('users').doc(currentUser.uid).get();
            if (doc.exists) {
                userData = doc.data();
                document.getElementById('userEmail').textContent = currentUser.email;
                document.getElementById('userGameUid').textContent = userData.gameUID || 'Not Set';
                document.getElementById('walletBalance').textContent = userData.wallet || 0;
                document.getElementById('matchesPlayed').textContent = userData.matchesPlayed || 0;
                document.getElementById('referralCount').textContent = userData.referralCount || 0;
                document.getElementById('referralCode').textContent = userData.referralCode || 'N/A';
                document.getElementById('referralLink').value = userData.referralCode || '';
            }
        }

        // Load Matches
        async function loadMatches() {
            const container = document.getElementById('matchesContainer');
            
            try {
                const snapshot = await db.collection('matches').where('status', '==', 'waiting').get();
                
                if (snapshot.empty) {
                    container.innerHTML = '<div class="col-12 text-center p-5"><i class="bi bi-emoji-frown" style="font-size: 50px; color: #aaa;"></i><p style="color: #aaa;">No matches available</p></div>';
                    return;
                }

                let html = '';
                snapshot.forEach(doc => {
                    const match = doc.data();
                    const maxPlayers = match.type === '1v1' ? 2 : 4;
                    const currentPlayers = match.players ? match.players.length : 0;
                    const isFull = currentPlayers >= maxPlayers;
                    
                    html += `
                        <div class="col-md-6 col-lg-4">
                            <div class="match-card ${isFull ? 'opacity-50' : ''}">
                                <div class="match-badge">${match.type}</div>
                                <h4 class="mb-3"><i class="bi bi-trophy-fill" style="color: gold;"></i> ₹${match.prize}</h4>
                                <p><i class="bi bi-tag"></i> Entry Fee: ₹${match.entryFee}</p>
                                <p><i class="bi bi-people"></i> Players: ${currentPlayers}/${maxPlayers}</p>
                                <button class="btn-gradient w-100 mt-3" onclick="joinMatch('${doc.id}', ${match.entryFee})" ${isFull ? 'disabled' : ''}>
                                    ${isFull ? 'Match Full' : 'Join Now'}
                                </button>
                            </div>
                        </div>
                    `;
                });
                
                container.innerHTML = html;
            } catch (error) {
                container.innerHTML = '<div class="col-12 text-center text-danger">Error loading matches</div>';
            }
        }

        // Logout
        window.logout = () => {
            auth.signOut();
        };

        // Auth State Observer
        auth.onAuthStateChanged(async (user) => {
            if (user) {
                currentUser = user;
                document.getElementById('authSection').style.display = 'none';
                document.getElementById('dashboardSection').style.display = 'block';
                
                // Check if user document exists
                const userDoc = await db.collection('users').doc(user.uid).get();
                if (!userDoc.exists) {
                    await db.collection('users').doc(user.uid).set({
                        email: user.email,
                        wallet: 20,
                        matchesPlayed: 0,
                        gameUID: '',
                        referralCode: 'FF' + Math.random().toString(36).substring(2, 8).toUpperCase(),
                        referralCount: 0,
                        createdAt: firebase.firestore.FieldValue.serverTimestamp()
                    });
                }
                
                loadUserData();
                loadMatches();

                // Real-time listeners
                db.collection('users').doc(user.uid).onSnapshot(() => loadUserData());
                db.collection('matches').where('status', '==', 'waiting').onSnapshot(() => loadMatches());
            } else {
                currentUser = null;
                document.getElementById('authSection').style.display = 'block';
                document.getElementById('dashboardSection').style.display = 'none';
            }
        });

        // Initialize Settings
        window.onload = async () => {
            // Create default settings if not exists
            const settingsRef = db.collection('settings').doc('config');
            const settingsDoc = await settingsRef.get();
            if (!settingsDoc.exists) {
                await settingsRef.set({
                    minDeposit: 10,
                    maxDeposit: 500,
                    referralBonus: 20,
                    welcomeBonus: 20
                });
            }

            // Create sample matches if none exist
            const matchesSnap = await db.collection('matches').get();
            if (matchesSnap.empty) {
                await db.collection('matches').add({
                    type: '1v1',
                    entryFee: 20,
                    prize: 18,
                    status: 'waiting',
                    players: [],
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                });
                await db.collection('matches').add({
                    type: '2v2',
                    entryFee: 40,
                    prize: 37,
                    status: 'waiting',
                    players: [],
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                });
            }
        };
    </script>
</body>
</html>
