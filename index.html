<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>FF TOURNAMENT • ELITE</title>
    
    <!-- Bootstrap 5 + Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <!-- AOS Animation -->
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: #030514;
            color: #fff;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* Cyber Grid Background */
        .cyber-grid {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(0, 255, 255, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 255, 0.05) 1px, transparent 1px);
            background-size: 50px 50px;
            z-index: -2;
            animation: gridMove 20s linear infinite;
        }

        @keyframes gridMove {
            0% { transform: translate(0, 0); }
            100% { transform: translate(50px, 50px); }
        }

        /* Animated Gradient Orbs */
        .orb {
            position: fixed;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            filter: blur(80px);
            z-index: -1;
            animation: orbFloat 10s ease-in-out infinite;
        }

        .orb-1 {
            background: rgba(0, 255, 255, 0.2);
            top: -100px;
            right: -100px;
        }

        .orb-2 {
            background: rgba(255, 0, 255, 0.2);
            bottom: -100px;
            left: -100px;
            animation-delay: -5s;
        }

        @keyframes orbFloat {
            0%, 100% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(50px, 50px) scale(1.2); }
        }

        /* Glassmorphism Card */
        .glass-card {
            background: rgba(10, 20, 30, 0.7);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(0, 255, 255, 0.2);
            border-radius: 35px;
            padding: 25px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden;
        }

        .glass-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.1), transparent);
            transition: left 0.7s ease;
        }

        .glass-card:hover::before {
            left: 100%;
        }

        .glass-card:hover {
            transform: translateY(-10px) scale(1.02);
            border-color: cyan;
            box-shadow: 0 30px 60px rgba(0, 255, 255, 0.3);
        }

        /* Neon Button */
        .btn-neon {
            background: transparent;
            border: 2px solid cyan;
            color: cyan;
            padding: 12px 25px;
            border-radius: 50px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 2px;
            position: relative;
            overflow: hidden;
            transition: all 0.3s;
            z-index: 1;
        }

        .btn-neon::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: cyan;
            transform: translate(-50%, -50%);
            transition: width 0.5s, height 0.5s;
            z-index: -1;
        }

        .btn-neon:hover::before {
            width: 300px;
            height: 300px;
        }

        .btn-neon:hover {
            color: #030514;
            box-shadow: 0 0 30px cyan;
        }

        /* Gradient Button */
        .btn-gradient {
            background: linear-gradient(135deg, #00f2fe, #4facfe);
            border: none;
            color: #030514;
            font-weight: 700;
            padding: 12px 25px;
            border-radius: 50px;
            box-shadow: 0 5px 20px rgba(0, 242, 254, 0.4);
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }

        .btn-gradient::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            transform: rotate(45deg);
            animation: shine 3s infinite;
        }

        @keyframes shine {
            0% { transform: translateX(-100%) rotate(45deg); }
            100% { transform: translateX(100%) rotate(45deg); }
        }

        .btn-gradient:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 40px rgba(0, 242, 254, 0.8);
        }

        /* Profile Card */
        .profile-card {
            background: linear-gradient(135deg, #667eea, #764ba2, #6b8cff);
            border-radius: 35px;
            padding: 30px;
            position: relative;
            overflow: hidden;
            animation: gradientMove 5s ease infinite;
            background-size: 300% 300%;
        }

        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Stat Card */
        .stat-card {
            background: rgba(0, 0, 0, 0.4);
            border-radius: 25px;
            padding: 20px;
            text-align: center;
            border-left: 5px solid;
            transition: all 0.3s;
            backdrop-filter: blur(10px);
        }

        .stat-card:hover {
            transform: translateY(-5px) scale(1.05);
        }

        .stat-card:nth-child(1) { border-color: #00ff88; }
        .stat-card:nth-child(2) { border-color: gold; }
        .stat-card:nth-child(3) { border-color: cyan; }

        /* Match Card */
        .match-card {
            background: linear-gradient(145deg, #1a2639, #0d1a2b);
            border-radius: 30px;
            padding: 25px;
            border: 1px solid rgba(0, 255, 255, 0.2);
            transition: all 0.4s;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            height: 100%;
        }

        .match-card::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(0, 255, 255, 0.1), transparent 70%);
            opacity: 0;
            transition: opacity 0.4s;
        }

        .match-card:hover::after {
            opacity: 1;
        }

        .match-card:hover {
            transform: translateY(-10px) scale(1.02);
            border-color: cyan;
            box-shadow: 0 0 40px rgba(0, 255, 255, 0.3);
        }

        /* Room Details */
        .room-details {
            background: linear-gradient(135deg, #00b4db, #0083b0);
            border-radius: 20px;
            padding: 20px;
            margin-top: 15px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(0, 255, 255, 0.7); }
            70% { box-shadow: 0 0 0 15px rgba(0, 255, 255, 0); }
            100% { box-shadow: 0 0 0 0 rgba(0, 255, 255, 0); }
        }

        .room-info {
            background: rgba(0, 0, 0, 0.5);
            border-radius: 15px;
            padding: 15px;
            font-family: 'Orbitron', monospace;
            font-size: 20px;
            text-align: center;
            border: 2px solid cyan;
            box-shadow: 0 0 20px cyan;
        }

        /* Status Badges */
        .badge-waiting {
            background: linear-gradient(45deg, #f7971e, #ffd200);
            padding: 8px 20px;
            border-radius: 50px;
            font-weight: 700;
            color: #030514;
        }

        .badge-live {
            background: linear-gradient(45deg, #00ff88, #00ccff);
            padding: 8px 20px;
            border-radius: 50px;
            font-weight: 700;
            animation: livePulse 1.5s infinite;
        }

        @keyframes livePulse {
            0% { opacity: 1; }
            50% { opacity: 0.7; box-shadow: 0 0 20px cyan; }
            100% { opacity: 1; }
        }

        .badge-completed {
            background: linear-gradient(45deg, #ff416c, #ff4b2b);
            padding: 8px 20px;
            border-radius: 50px;
            font-weight: 700;
            color: white;
        }

        /* Input Fields */
        .input-elite {
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(0, 255, 255, 0.3);
            border-radius: 50px;
            padding: 15px 20px;
            color: white;
            width: 100%;
            transition: all 0.3s;
            font-size: 16px;
        }

        .input-elite:focus {
            outline: none;
            border-color: cyan;
            box-shadow: 0 0 30px cyan;
            background: rgba(255, 255, 255, 0.15);
            transform: scale(1.02);
        }

        /* Referral Box */
        .referral-box {
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 30px;
            padding: 25px;
            position: relative;
            overflow: hidden;
        }

        .referral-box::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.3), transparent 70%);
            animation: rotate 10s linear infinite;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* Loading Spinner */
        .spinner-elite {
            width: 60px;
            height: 60px;
            border: 6px solid rgba(0, 255, 255, 0.1);
            border-top: 6px solid cyan;
            border-right: 6px solid cyan;
            border-radius: 50%;
            animation: spin 1s cubic-bezier(0.68, -0.55, 0.265, 1.55) infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Toast */
        .toast-elite {
            position: fixed;
            top: 20px;
            right: 20px;
            min-width: 350px;
            padding: 20px;
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            border-left: 8px solid;
            color: white;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
            z-index: 9999;
            animation: slideInRight 0.3s ease;
        }

        .toast-elite.success { border-color: #00ff88; }
        .toast-elite.error { border-color: #ff416c; }

        @keyframes slideInRight {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        /* Tabs */
        .tab-elite {
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(10px);
            border-radius: 60px;
            padding: 5px;
            display: flex;
            gap: 5px;
            flex-wrap: wrap;
        }

        .tab-elite button {
            flex: 1;
            padding: 15px;
            border: none;
            background: transparent;
            color: #aaa;
            border-radius: 55px;
            transition: all 0.3s;
            font-weight: 600;
            min-width: 100px;
        }

        .tab-elite button.active {
            background: linear-gradient(135deg, cyan, #00ff88);
            color: #030514;
            box-shadow: 0 5px 20px rgba(0, 255, 255, 0.5);
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 10px;
        }

        ::-webkit-scrollbar-track {
            background: #1a1f35;
        }

        ::-webkit-scrollbar-thumb {
            background: linear-gradient(45deg, cyan, #00ff88);
            border-radius: 10px;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .glass-card { padding: 15px; }
            .btn-neon { padding: 8px 15px; }
            .profile-card { padding: 20px; }
            .tab-elite button { padding: 10px; font-size: 14px; }
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 50px 20px;
            color: #666;
        }

        .empty-state i {
            font-size: 60px;
            margin-bottom: 20px;
            color: cyan;
            opacity: 0.5;
        }
    </style>
</head>
<body>
    <!-- Background Elements -->
    <div class="cyber-grid"></div>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <div class="container-fluid p-3 p-md-4">
        <!-- Toast Container -->
        <div id="toastContainer"></div>

        <!-- Loading Overlay -->
        <div id="loadingOverlay" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(3,5,20,0.95); backdrop-filter: blur(10px); z-index: 99999; display: none; justify-content: center; align-items: center; flex-direction: column;">
            <div class="spinner-elite"></div>
            <p class="mt-4 text-info" style="font-size: 20px;">Processing...</p>
        </div>

        <!-- Auth Section -->
        <div id="authSection" class="glass-card" style="max-width: 500px; margin: 50px auto;" data-aos="fade-up">
            <div class="text-center mb-5">
                <i class="bi bi-controller" style="font-size: 70px; color: cyan;"></i>
                <h1 style="font-family: 'Orbitron'; font-weight: 900; background: linear-gradient(135deg, cyan, #00ff88); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">ELITE TOURNAMENT</h1>
                <p class="text-muted">Join the Battle Royale</p>
            </div>

            <!-- Tabs -->
            <div class="tab-elite mb-4">
                <button class="active" onclick="switchTab('login')" id="loginTab">LOGIN</button>
                <button onclick="switchTab('register')" id="registerTab">REGISTER</button>
            </div>

            <!-- Login Form -->
            <div id="loginForm">
                <div class="mb-4" data-aos="fade-right">
                    <input type="email" id="loginEmail" class="input-elite" placeholder="⚡ Email Address">
                </div>
                <div class="mb-4" data-aos="fade-left">
                    <input type="password" id="loginPassword" class="input-elite" placeholder="🔐 Password">
                </div>
                <button class="btn-gradient w-100" onclick="handleLogin()" data-aos="zoom-in">
                    <i class="bi bi-box-arrow-in-right"></i> ENTER THE ARENA
                </button>
            </div>

            <!-- Register Form -->
            <div id="registerForm" style="display: none;">
                <div class="mb-4">
                    <input type="email" id="regEmail" class="input-elite" placeholder="📧 Email">
                </div>
                <div class="mb-4">
                    <input type="password" id="regPassword" class="input-elite" placeholder="🔑 Password (min 6 chars)">
                </div>
                <div class="mb-4">
                    <input type="text" id="regReferral" class="input-elite" placeholder="🎁 Referral Code (Optional)">
                </div>
                <button class="btn-gradient w-100" onclick="handleRegister()">
                    <i class="bi bi-person-plus"></i> CREATE ACCOUNT
                </button>
            </div>

            <p id="authMessage" class="text-center mt-4 text-warning"></p>
        </div>

        <!-- Dashboard -->
        <div id="dashboardSection" style="display: none;">
            <!-- Profile Card -->
            <div class="profile-card mb-4" data-aos="fade-down">
                <div class="d-flex flex-column flex-md-row justify-content-between align-items-center">
                    <div class="text-center text-md-start mb-3 mb-md-0">
                        <h2 class="mb-2"><i class="bi bi-person-circle"></i> <span id="userEmail"></span></h2>
                        <p class="mb-0"><i class="bi bi-controller"></i> Game UID: <span id="userGameUid" class="fw-bold">Not Set</span></p>
                    </div>
                    <button class="btn-neon" onclick="logout()">
                        <i class="bi bi-box-arrow-right"></i> EXIT
                    </button>
                </div>
            </div>

            <!-- Stats Row -->
            <div class="row g-3 g-md-4 mb-4">
                <div class="col-md-4" data-aos="fade-up" data-aos-delay="0">
                    <div class="stat-card">
                        <i class="bi bi-wallet2" style="font-size: 40px; color: #00ff88;"></i>
                        <h3 class="mt-2">WALLET</h3>
                        <h2 style="color: #00ff88; font-size: 36px;">₹<span id="walletBalance">0</span></h2>
                    </div>
                </div>
                <div class="col-md-4" data-aos="fade-up" data-aos-delay="100">
                    <div class="stat-card">
                        <i class="bi bi-trophy" style="font-size: 40px; color: gold;"></i>
                        <h3 class="mt-2">MATCHES</h3>
                        <h2 style="color: gold;" id="matchesPlayed">0</h2>
                    </div>
                </div>
                <div class="col-md-4" data-aos="fade-up" data-aos-delay="200">
                    <div class="stat-card">
                        <i class="bi bi-people" style="font-size: 40px; color: cyan;"></i>
                        <h3 class="mt-2">REFERRALS</h3>
                        <h2 style="color: cyan;" id="referralCount">0</h2>
                    </div>
                </div>
            </div>

            <!-- Action Cards -->
            <div class="row g-3 g-md-4 mb-4">
                <!-- Set UID -->
                <div class="col-md-3" data-aos="flip-left" data-aos-delay="0">
                    <div class="glass-card h-100">
                        <h5 class="mb-3"><i class="bi bi-id-card"></i> GAME UID</h5>
                        <input type="text" id="gameUidInput" class="input-elite mb-3" placeholder="Enter your UID">
                        <button class="btn-neon w-100" onclick="setGameUid()">SAVE</button>
                    </div>
                </div>

                <!-- Deposit -->
                <div class="col-md-3" data-aos="flip-left" data-aos-delay="100">
                    <div class="glass-card h-100">
                        <h5 class="mb-3"><i class="bi bi-arrow-down-circle"></i> ADD FUNDS</h5>
                        <p class="text-info small">UPI: <strong>uddin6@fam</strong></p>
                        <input type="number" id="depositAmount" class="input-elite mb-2" placeholder="₹10-500">
                        <input type="text" id="upiRefId" class="input-elite mb-3" placeholder="UPI Ref ID">
                        <button class="btn-gradient w-100" onclick="requestDeposit()">DEPOSIT</button>
                    </div>
                </div>

                <!-- Withdraw -->
                <div class="col-md-3" data-aos="flip-left" data-aos-delay="200">
                    <div class="glass-card h-100">
                        <h5 class="mb-3"><i class="bi bi-arrow-up-circle"></i> WITHDRAW</h5>
                        <input type="number" id="withdrawAmount" class="input-elite mb-2" placeholder="Amount">
                        <input type="text" id="withdrawUpi" class="input-elite mb-3" placeholder="Your UPI ID">
                        <button class="btn-neon w-100" onclick="requestWithdraw()">WITHDRAW</button>
                    </div>
                </div>

                <!-- Referral -->
                <div class="col-md-3" data-aos="flip-left" data-aos-delay="300">
                    <div class="referral-box h-100">
                        <h5 class="mb-3"><i class="bi bi-gift"></i> REFER & EARN</h5>
                        <p class="mb-2">Your Code: <strong id="referralCode" style="font-size: 20px;"></strong></p>
                        <div class="d-flex gap-2">
                            <button class="btn-neon flex-fill" onclick="copyReferral()">COPY</button>
                            <button class="btn-gradient flex-fill" onclick="shareWhatsApp()">
                                <i class="bi bi-whatsapp"></i> SHARE
                            </button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Tournaments Section -->
            <div class="glass-card" data-aos="fade-up">
                <h3 class="mb-4"><i class="bi bi-trophy-fill text-warning"></i> LIVE TOURNAMENTS</h3>
                
                <!-- Match Tabs -->
                <div class="tab-elite mb-4">
                    <button class="active" onclick="showMatchTab('waiting')" id="waitingTab">WAITING</button>
                    <button onclick="showMatchTab('live')" id="liveTab">LIVE</button>
                    <button onclick="showMatchTab('completed')" id="completedTab">COMPLETED</button>
                </div>

                <!-- Match Containers -->
                <div id="waitingMatches" class="row g-4"></div>
                <div id="liveMatches" class="row g-4" style="display: none;"></div>
                <div id="completedMatches" class="row g-4" style="display: none;"></div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

    <script>
        AOS.init({
            duration: 800,
            once: true
        });

        // Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyAZcAJNzY8nFZMD7ILuOArGmnjBeRRMgbo",
            authDomain: "ff-tournament-81d64.firebaseapp.com",
            projectId: "ff-tournament-81d64",
            storageBucket: "ff-tournament-81d64.firebasestorage.app",
            messagingSenderId: "171831529957",
            appId: "1:171831529957:web:833981b11c3383a9f49f0c"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        let currentUser = null;
        let userData = null;

        // Toast
        function showToast(message, type = 'success') {
            const toast = document.createElement('div');
            toast.className = `toast-elite ${type}`;
            toast.innerHTML = `
                <div class="d-flex align-items-center">
                    <i class="bi ${type === 'success' ? 'bi-check-circle-fill text-success' : 'bi-exclamation-circle-fill text-danger'} me-3" style="font-size: 24px;"></i>
                    <div>
                        <strong>${type === 'success' ? 'SUCCESS!' : 'ERROR!'}</strong>
                        <p class="mb-0">${message}</p>
                    </div>
                </div>
            `;
            document.getElementById('toastContainer').appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        // Loading
        function showLoading(show) {
            document.getElementById('loadingOverlay').style.display = show ? 'flex' : 'none';
        }

        // Switch Tab
        window.switchTab = (tab) => {
            if (tab === 'login') {
                document.getElementById('loginTab').classList.add('active');
                document.getElementById('registerTab').classList.remove('active');
                document.getElementById('loginForm').style.display = 'block';
                document.getElementById('registerForm').style.display = 'none';
            } else {
                document.getElementById('registerTab').classList.add('active');
                document.getElementById('loginTab').classList.remove('active');
                document.getElementById('registerForm').style.display = 'block';
                document.getElementById('loginForm').style.display = 'none';
            }
        };

        // Show Match Tab
        window.showMatchTab = (tab) => {
            document.getElementById('waitingTab').classList.remove('active');
            document.getElementById('liveTab').classList.remove('active');
            document.getElementById('completedTab').classList.remove('active');
            
            document.getElementById('waitingMatches').style.display = 'none';
            document.getElementById('liveMatches').style.display = 'none';
            document.getElementById('completedMatches').style.display = 'none';
            
            if (tab === 'waiting') {
                document.getElementById('waitingTab').classList.add('active');
                document.getElementById('waitingMatches').style.display = 'flex';
            } else if (tab === 'live') {
                document.getElementById('liveTab').classList.add('active');
                document.getElementById('liveMatches').style.display = 'flex';
            } else {
                document.getElementById('completedTab').classList.add('active');
                document.getElementById('completedMatches').style.display = 'flex';
            }
        };

        // Login
        window.handleLogin = async () => {
            const email = document.getElementById('loginEmail').value;
            const pass = document.getElementById('loginPassword').value;
            
            if (!email || !pass) {
                showToast('Please fill all fields', 'error');
                return;
            }

            showLoading(true);
            try {
                await auth.signInWithEmailAndPassword(email, pass);
                showToast('Welcome to the arena! ⚔️');
            } catch (error) {
                showToast(error.message, 'error');
            } finally {
                showLoading(false);
            }
        };

        // Register
        window.handleRegister = async () => {
            const email = document.getElementById('regEmail').value;
            const pass = document.getElementById('regPassword').value;
            const referral = document.getElementById('regReferral').value;

            if (!email || !pass) {
                showToast('Fill all fields', 'error');
                return;
            }

            if (pass.length < 6) {
                showToast('Password must be 6+ characters', 'error');
                return;
            }

            showLoading(true);
            try {
                const result = await auth.createUserWithEmailAndPassword(email, pass);
                const referralCode = 'FF' + Math.random().toString(36).substring(2, 8).toUpperCase();
                
                await db.collection('users').doc(result.user.uid).set({
                    email: email,
                    wallet: 20,
                    matchesPlayed: 0,
                    gameUID: '',
                    referralCode: referralCode,
                    referredBy: referral || null,
                    referralCount: 0,
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                });

                if (referral) {
                    const referrerQuery = await db.collection('users').where('referralCode', '==', referral).get();
                    if (!referrerQuery.empty) {
                        await referrerQuery.docs[0].ref.update({
                            wallet: firebase.firestore.FieldValue.increment(30),
                            referralCount: firebase.firestore.FieldValue.increment(1)
                        });
                        showToast('Referral bonus applied! +₹30', 'success');
                    }
                }

                showToast('Account created! ₹20 bonus added! 🎉');
            } catch (error) {
                showToast(error.message, 'error');
            } finally {
                showLoading(false);
            }
        };

        // Set Game UID
        window.setGameUid = async () => {
            if (!currentUser) return;
            const uid = document.getElementById('gameUidInput').value;
            
            if (!uid) {
                showToast('Please enter Game UID', 'error');
                return;
            }

            showLoading(true);
            try {
                await db.collection('users').doc(currentUser.uid).update({
                    gameUID: uid
                });
                showToast('Game UID saved successfully! ✅');
                loadUserData();
            } catch (error) {
                showToast(error.message, 'error');
            } finally {
                showLoading(false);
            }
        };

        // Deposit
        window.requestDeposit = async () => {
            if (!currentUser) return;
            const amount = parseInt(document.getElementById('depositAmount').value);
            const refId = document.getElementById('upiRefId').value;

            if (!amount || !refId) {
                showToast('Fill all fields', 'error');
                return;
            }

            if (amount < 10 || amount > 500) {
                showToast('Amount must be ₹10-500', 'error');
                return;
            }

            showLoading(true);
            try {
                await db.collection('deposit_requests').add({
                    userId: currentUser.uid,
                    userEmail: currentUser.email,
                    amount: amount,
                    refId: refId,
                    status: 'pending',
                    timestamp: firebase.firestore.FieldValue.serverTimestamp()
                });
                showToast('Deposit request sent! Admin will approve soon.');
                document.getElementById('depositAmount').value = '';
                document.getElementById('upiRefId').value = '';
            } catch (error) {
                showToast(error.message, 'error');
            } finally {
                showLoading(false);
            }
        };

        // Withdraw
        window.requestWithdraw = async () => {
            if (!currentUser || !userData) return;
            const amount = parseInt(document.getElementById('withdrawAmount').value);
            const upi = document.getElementById('withdrawUpi').value;

            if (!amount || !upi) {
                showToast('Fill all fields', 'error');
                return;
            }

            if (amount > userData.wallet) {
                showToast('Insufficient balance!', 'error');
                return;
            }

            showLoading(true);
            try {
                await db.runTransaction(async (transaction) => {
                    const userRef = db.collection('users').doc(currentUser.uid);
                    const userSnap = await transaction.get(userRef);
                    
                    if (!userSnap.exists) throw 'User not found';
                    if (userSnap.data().wallet < amount) throw 'Insufficient balance';
                    
                    transaction.update(userRef, {
                        wallet: firebase.firestore.FieldValue.increment(-amount)
                    });
                    
                    await transaction.set(db.collection('withdraw_requests').doc(), {
                        userId: currentUser.uid,
                        userEmail: currentUser.email,
                        amount: amount,
                        upiId: upi,
                        status: 'pending',
                        timestamp: firebase.firestore.FieldValue.serverTimestamp()
                    });
                });
                
                showToast(`Withdrawal request sent! ₹${amount} deducted from wallet.`);
                document.getElementById('withdrawAmount').value = '';
                document.getElementById('withdrawUpi').value = '';
                loadUserData();
            } catch (error) {
                showToast(error.toString(), 'error');
            } finally {
                showLoading(false);
            }
        };

        // Join Match
        window.joinMatch = async (matchId, entryFee) => {
            if (!currentUser || !userData) {
                showToast('Please login first', 'error');
                return;
            }

            if (!userData.gameUID) {
                showToast('Set your Game UID first!', 'error');
                return;
            }

            if (userData.wallet < entryFee) {
                showToast('Insufficient balance!', 'error');
                return;
            }

            showLoading(true);
            try {
                const matchRef = db.collection('matches').doc(matchId);
                const userRef = db.collection('users').doc(currentUser.uid);

                await db.runTransaction(async (transaction) => {
                    const matchDoc = await transaction.get(matchRef);
                    const userDoc = await transaction.get(userRef);

                    if (!matchDoc.exists) throw 'Match not found';
                    const matchData = matchDoc.data();
                    
                    if (matchData.status !== 'waiting') throw 'Match not available';
                    
                    const maxPlayers = matchData.type === '1v1' ? 2 : 4;
                    if (matchData.players && matchData.players.length >= maxPlayers) throw 'Match is full';

                    transaction.update(userRef, {
                        wallet: firebase.firestore.FieldValue.increment(-entryFee)
                    });

                    transaction.update(matchRef, {
                        players: firebase.firestore.FieldValue.arrayUnion(currentUser.uid)
                    });
                });

                showToast('Successfully joined match! Good luck! 🎮');
                loadAllMatches();
                loadUserData();
            } catch (error) {
                showToast(error.toString(), 'error');
            } finally {
                showLoading(false);
            }
        };

        // Copy Referral
        window.copyReferral = () => {
            const code = document.getElementById('referralCode').innerText;
            navigator.clipboard.writeText(code);
            showToast('Referral code copied! Share with friends');
        };

        // Share WhatsApp
        window.shareWhatsApp = () => {
            const code = document.getElementById('referralCode').innerText;
            const text = `🎮 Join Free Fire Tournament and get ₹20 bonus! Use my referral code: ${code}\n\nDownload now: ${window.location.href}`;
            window.open(`https://wa.me/?text=${encodeURIComponent(text)}`, '_blank');
        };

        // Check if user joined
        function hasUserJoined(players) {
            return currentUser && players && players.includes(currentUser.uid);
        }

        // Load User Data
        async function loadUserData() {
            if (!currentUser) return;
            
            const doc = await db.collection('users').doc(currentUser.uid).get();
            if (doc.exists) {
                userData = doc.data();
                document.getElementById('userEmail').innerText = currentUser.email;
                document.getElementById('userGameUid').innerText = userData.gameUID || 'Not Set';
                document.getElementById('walletBalance').innerText = userData.wallet || 0;
                document.getElementById('matchesPlayed').innerText = userData.matchesPlayed || 0;
                document.getElementById('referralCount').innerText = userData.referralCount || 0;
                document.getElementById('referralCode').innerText = userData.referralCode || '';
            }
        }

        // Load All Matches - FIXED: Now shows all matches properly
        async function loadAllMatches() {
            try {
                const snapshot = await db.collection('matches').orderBy('createdAt', 'desc').get();
                
                let waitingHtml = '';
                let liveHtml = '';
                let completedHtml = '';

                if (snapshot.empty) {
                    waitingHtml = '<div class="col-12"><div class="empty-state"><i class="bi bi-emoji-frown"></i><h4>No matches available</h4><p>Check back later for new tournaments</p></div></div>';
                    liveHtml = waitingHtml;
                    completedHtml = waitingHtml;
                } else {
                    snapshot.forEach(doc => {
                        const m = doc.data();
                        const maxPlayers = m.type === '1v1' ? 2 : 4;
                        const currentPlayers = m.players ? m.players.length : 0;
                        const joined = hasUserJoined(m.players);

                        const matchCard = `
                            <div class="col-md-6 col-lg-4">
                                <div class="match-card" data-aos="zoom-in">
                                    <div class="d-flex justify-content-between align-items-center mb-3">
                                        <h4 class="mb-0">${m.type}</h4>
                                        <span class="badge-${m.status}">${m.status.toUpperCase()}</span>
                                    </div>
                                    
                                    <div class="mb-3">
                                        <p class="mb-1"><i class="bi bi-trophy text-warning"></i> Prize: ₹${m.prize}</p>
                                        <p class="mb-1"><i class="bi bi-tag text-info"></i> Entry: ₹${m.entryFee}</p>
                                        <p class="mb-1"><i class="bi bi-people"></i> Players: ${currentPlayers}/${maxPlayers}</p>
                                    </div>
                                    
                                    ${joined && m.status === 'live' && m.roomId ? `
                                        <div class="room-details">
                                            <h6 class="text-center mb-3">🎮 ROOM ACCESS</h6>
                                            <div class="room-info mb-2">
                                                <div>ID: ${m.roomId}</div>
                                            </div>
                                            <div class="room-info">
                                                <div>PASS: ${m.roomPassword}</div>
                                            </div>
                                        </div>
                                    ` : ''}
                                    
                                    ${joined ? '<p class="text-success mt-2"><i class="bi bi-check-circle"></i> You have joined</p>' : ''}
                                    
                                    ${m.status === 'waiting' && !joined ? `
                                        <button class="btn-gradient w-100 mt-3" onclick="joinMatch('${doc.id}', ${m.entryFee})">
                                            <i class="bi bi-joystick"></i> JOIN NOW
                                        </button>
                                    ` : ''}
                                    
                                    ${m.winner ? '<p class="text-warning mt-2"><i class="bi bi-crown"></i> Winner declared</p>' : ''}
                                </div>
                            </div>
                        `;

                        if (m.status === 'waiting') waitingHtml += matchCard;
                        else if (m.status === 'live') liveHtml += matchCard;
                        else if (m.status === 'completed') completedHtml += matchCard;
                    });

                    // If no matches in category, show empty state
                    if (!waitingHtml) {
                        waitingHtml = '<div class="col-12"><div class="empty-state"><i class="bi bi-clock-history"></i><h4>No waiting matches</h4><p>Join a match when they become available</p></div></div>';
                    }
                    if (!liveHtml) {
                        liveHtml = '<div class="col-12"><div class="empty-state"><i class="bi bi-broadcast"></i><h4>No live matches</h4><p>Check back when matches start</p></div></div>';
                    }
                    if (!completedHtml) {
                        completedHtml = '<div class="col-12"><div class="empty-state"><i class="bi bi-check2-circle"></i><h4>No completed matches</h4><p>Play matches to see history</p></div></div>';
                    }
                }

                document.getElementById('waitingMatches').innerHTML = waitingHtml;
                document.getElementById('liveMatches').innerHTML = liveHtml;
                document.getElementById('completedMatches').innerHTML = completedHtml;
            } catch (error) {
                console.error('Error loading matches:', error);
                showToast('Error loading matches', 'error');
            }
        }

        // Logout
        window.logout = () => auth.signOut();

        // Auth Observer
        auth.onAuthStateChanged(async (user) => {
            if (user) {
                currentUser = user;
                document.getElementById('authSection').style.display = 'none';
                document.getElementById('dashboardSection').style.display = 'block';
                
                const userDoc = await db.collection('users').doc(user.uid).get();
                if (!userDoc.exists) {
                    await db.collection('users').doc(user.uid).set({
                        email: user.email,
                        wallet: 20,
                        matchesPlayed: 0,
                        gameUID: '',
                        referralCode: 'FF' + Math.random().toString(36).substring(2, 8).toUpperCase(),
                        referralCount: 0,
                        createdAt: firebase.firestore.FieldValue.serverTimestamp()
                    });
                }
                
                await loadUserData();
                await loadAllMatches();

                // FIXED: Real-time listener for matches
                db.collection('users').doc(user.uid).onSnapshot(() => loadUserData());
                db.collection('matches').onSnapshot(() => {
                    console.log('Matches updated, refreshing...');
                    loadAllMatches();
                });
            } else {
                currentUser = null;
                document.getElementById('authSection').style.display = 'block';
                document.getElementById('dashboardSection').style.display = 'none';
            }
        });

        // Initialize
        window.onload = async () => {
            const settings = await db.collection('settings').doc('config').get();
            if (!settings.exists) {
                await db.collection('settings').doc('config').set({
                    minDeposit: 10,
                    maxDeposit: 500,
                    referralBonus: 30,
                    welcomeBonus: 20
                });
            }

            // Create sample matches if none exist (for testing)
            const matches = await db.collection('matches').get();
            if (matches.empty) {
                await db.collection('matches').add({
                    type: '1v1',
                    entryFee: 20,
                    prize: 18,
                    status: 'waiting',
                    players: [],
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                });
                await db.collection('matches').add({
                    type: '2v2',
                    entryFee: 40,
                    prize: 37,
                    status: 'waiting',
                    players: [],
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                });
                console.log('Sample matches created');
            }
        };
    </script>
</body>
</html>
