<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FF Tournament | User Panel</title>
    
    <!-- Bootstrap 5 + Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;800&family=Rajdhani:wght@300;400;600&display=swap" rel="stylesheet">
    
    <!-- Animate.css -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Rajdhani', sans-serif;
            background: #0a0f1f;
            color: #fff;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Animated Background */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                radial-gradient(circle at 20% 30%, rgba(0, 255, 255, 0.1) 0%, transparent 30%),
                radial-gradient(circle at 80% 70%, rgba(255, 0, 255, 0.1) 0%, transparent 30%),
                linear-gradient(135deg, #0a0f1f 0%, #1a1f35 100%);
            z-index: -2;
        }

        /* Floating Particles */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
        }

        .particle {
            position: absolute;
            width: 2px;
            height: 2px;
            background: rgba(0, 255, 255, 0.5);
            box-shadow: 0 0 10px cyan;
            border-radius: 50%;
            animation: float 20s infinite linear;
        }

        @keyframes float {
            0% { transform: translateY(100vh) translateX(0); opacity: 1; }
            100% { transform: translateY(-100vh) translateX(100px); opacity: 0; }
        }

        /* Glass Card */
        .glass-card {
            background: rgba(20, 30, 50, 0.7);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(0, 255, 255, 0.2);
            border-radius: 30px;
            padding: 25px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
            transition: all 0.4s ease;
        }

        .glass-card:hover {
            border-color: cyan;
            box-shadow: 0 20px 45px rgba(0, 255, 255, 0.3);
            transform: translateY(-5px);
        }

        /* Neon Buttons */
        .btn-neon {
            background: transparent;
            border: 2px solid cyan;
            color: cyan;
            padding: 10px 20px;
            border-radius: 50px;
            font-weight: 600;
            transition: all 0.3s;
        }

        .btn-neon:hover {
            background: cyan;
            color: #0a0f1f;
            box-shadow: 0 0 20px cyan;
        }

        .btn-gradient {
            background: linear-gradient(45deg, #00ff88, #00ccff);
            border: none;
            color: #0a0f1f;
            font-weight: 700;
            padding: 12px 25px;
            border-radius: 50px;
            box-shadow: 0 5px 20px rgba(0, 255, 255, 0.4);
        }

        /* Profile Card */
        .profile-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 30px;
            padding: 30px;
            margin-bottom: 30px;
        }

        /* Stat Card */
        .stat-card {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            border-left: 5px solid cyan;
        }

        /* Match Cards */
        .match-card {
            background: linear-gradient(145deg, #1e2a3a, #0f1a2a);
            border-radius: 25px;
            padding: 20px;
            border: 1px solid rgba(0, 255, 255, 0.2);
            transition: all 0.3s;
            height: 100%;
        }

        .match-card:hover {
            border-color: cyan;
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.3);
            transform: translateY(-5px);
        }

        /* Room Details Card */
        .room-card {
            background: rgba(0, 255, 255, 0.1);
            border-radius: 15px;
            padding: 15px;
            margin-top: 15px;
            border: 1px dashed cyan;
        }

        .room-detail {
            background: rgba(0, 0, 0, 0.5);
            padding: 10px;
            border-radius: 10px;
            margin: 5px 0;
            font-family: monospace;
            font-size: 18px;
        }

        /* Status Badges */
        .status-waiting {
            background: linear-gradient(45deg, #f7971e, #ffd200);
            color: #0a0f1f;
            padding: 5px 15px;
            border-radius: 50px;
            font-weight: 600;
        }

        .status-live {
            background: linear-gradient(45deg, #00ff88, #00ccff);
            color: #0a0f1f;
            padding: 5px 15px;
            border-radius: 50px;
            font-weight: 600;
            animation: pulse 1.5s infinite;
        }

        .status-completed {
            background: linear-gradient(45deg, #ff416c, #ff4b2b);
            color: white;
            padding: 5px 15px;
            border-radius: 50px;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.7; box-shadow: 0 0 20px cyan; }
            100% { opacity: 1; }
        }

        /* WhatsApp Button */
        .btn-whatsapp {
            background: #25D366;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 50px;
            font-weight: 600;
        }

        .btn-whatsapp:hover {
            background: #128C7E;
            color: white;
        }

        /* Referral Box */
        .referral-box {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 15px;
            padding: 20px;
            border: 2px solid cyan;
        }

        /* Loading */
        .spinner-modern {
            width: 50px;
            height: 50px;
            border: 5px solid rgba(0, 255, 255, 0.1);
            border-top: 5px solid cyan;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Toast */
        .toast-notification {
            position: fixed;
            top: 20px;
            right: 20px;
            min-width: 300px;
            padding: 20px;
            border-radius: 15px;
            background: rgba(0, 0, 0, 0.9);
            border-left: 5px solid cyan;
            color: white;
            z-index: 9999;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
    </style>
</head>
<body>
    <!-- Particles -->
    <div class="particles" id="particles"></div>

    <div class="container-fluid p-4">
        <!-- Toast Container -->
        <div id="toastContainer"></div>

        <!-- Loading Overlay -->
        <div id="loadingOverlay" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 99999; display: none; justify-content: center; align-items: center; flex-direction: column;">
            <div class="spinner-modern" style="width: 80px; height: 80px;"></div>
            <p style="color: cyan; margin-top: 20px;">Loading...</p>
        </div>

        <!-- Auth Section -->
        <div id="authSection" class="glass-card" style="max-width: 500px; margin: 50px auto;">
            <div class="text-center mb-4">
                <i class="bi bi-controller" style="font-size: 60px; color: cyan;"></i>
                <h1 style="font-family: 'Orbitron';">FF TOURNAMENT</h1>
            </div>

            <!-- Tabs -->
            <div class="d-flex gap-2 mb-4">
                <button class="btn-neon flex-fill active" onclick="switchTab('login')" id="loginTab">Login</button>
                <button class="btn-neon flex-fill" onclick="switchTab('register')" id="registerTab">Register</button>
            </div>

            <!-- Login Form -->
            <div id="loginForm">
                <input type="email" id="loginEmail" class="form-control bg-dark text-white border-info mb-3" placeholder="Email">
                <input type="password" id="loginPassword" class="form-control bg-dark text-white border-info mb-3" placeholder="Password">
                <button class="btn-gradient w-100" onclick="handleLogin()">Login</button>
            </div>

            <!-- Register Form -->
            <div id="registerForm" style="display: none;">
                <input type="email" id="regEmail" class="form-control bg-dark text-white border-info mb-3" placeholder="Email">
                <input type="password" id="regPassword" class="form-control bg-dark text-white border-info mb-3" placeholder="Password (min 6 chars)">
                <input type="text" id="regReferral" class="form-control bg-dark text-white border-info mb-3" placeholder="Referral Code (Optional)">
                <button class="btn-gradient w-100" onclick="handleRegister()">Register</button>
            </div>

            <p id="authMessage" class="text-center mt-3 text-warning"></p>
        </div>

        <!-- Dashboard -->
        <div id="dashboardSection" style="display: none;">
            <!-- Profile Header -->
            <div class="profile-card d-flex justify-content-between align-items-center">
                <div>
                    <h2><i class="bi bi-person-circle"></i> <span id="userEmail"></span></h2>
                    <p class="mb-0">Game UID: <span id="userGameUid">Not Set</span></p>
                </div>
                <button class="btn-neon" onclick="logout()">Logout</button>
            </div>

            <!-- Stats -->
            <div class="row g-4 mb-4">
                <div class="col-md-4">
                    <div class="stat-card">
                        <i class="bi bi-wallet2" style="font-size: 40px; color: #00ff88;"></i>
                        <h3>Wallet</h3>
                        <h2 style="color: #00ff88;">₹<span id="walletBalance">0</span></h2>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="stat-card">
                        <i class="bi bi-trophy" style="font-size: 40px; color: gold;"></i>
                        <h3>Matches</h3>
                        <h2 style="color: gold;" id="matchesPlayed">0</h2>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="stat-card">
                        <i class="bi bi-people" style="font-size: 40px; color: cyan;"></i>
                        <h3>Referrals</h3>
                        <h2 style="color: cyan;" id="referralCount">0</h2>
                    </div>
                </div>
            </div>

            <!-- Actions -->
            <div class="row g-4 mb-4">
                <!-- Set UID -->
                <div class="col-md-3">
                    <div class="glass-card">
                        <h5>Set Game UID</h5>
                        <input type="text" id="gameUidInput" class="form-control bg-dark text-white mb-2" placeholder="Enter UID">
                        <button class="btn-neon w-100" onclick="setGameUid()">Save</button>
                    </div>
                </div>

                <!-- Deposit -->
                <div class="col-md-3">
                    <div class="glass-card">
                        <h5>Add Funds</h5>
                        <p class="text-info">UPI: uddin6@fam</p>
                        <input type="number" id="depositAmount" class="form-control bg-dark text-white mb-2" placeholder="₹10-500">
                        <input type="text" id="upiRefId" class="form-control bg-dark text-white mb-2" placeholder="Ref ID">
                        <button class="btn-gradient w-100" onclick="requestDeposit()">Deposit</button>
                    </div>
                </div>

                <!-- Withdraw -->
                <div class="col-md-3">
                    <div class="glass-card">
                        <h5>Withdraw</h5>
                        <input type="number" id="withdrawAmount" class="form-control bg-dark text-white mb-2" placeholder="Amount">
                        <input type="text" id="withdrawUpi" class="form-control bg-dark text-white mb-2" placeholder="Your UPI">
                        <button class="btn-neon w-100" onclick="requestWithdraw()">Withdraw</button>
                    </div>
                </div>

                <!-- Referral -->
                <div class="col-md-3">
                    <div class="glass-card">
                        <h5>Refer & Earn</h5>
                        <p class="mb-1">Your Code: <strong id="referralCode"></strong></p>
                        <div class="d-flex gap-2">
                            <button class="btn-neon flex-fill" onclick="copyReferral()">Copy</button>
                            <button class="btn-whatsapp flex-fill" onclick="shareWhatsApp()">
                                <i class="bi bi-whatsapp"></i> Share
                            </button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Tournaments Section -->
            <div class="glass-card">
                <h3 class="mb-4"><i class="bi bi-trophy-fill text-warning"></i> Tournaments</h3>
                
                <!-- Tabs for different match status -->
                <ul class="nav nav-tabs mb-4">
                    <li class="nav-item">
                        <a class="nav-link active" data-bs-toggle="tab" href="#waiting">Waiting</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" data-bs-toggle="tab" href="#live">Live</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" data-bs-toggle="tab" href="#completed">Completed</a>
                    </li>
                </ul>

                <div class="tab-content">
                    <!-- Waiting Matches -->
                    <div class="tab-pane active" id="waiting">
                        <div class="row g-4" id="waitingMatches"></div>
                    </div>
                    
                    <!-- Live Matches (SHOW ROOM DETAILS) -->
                    <div class="tab-pane fade" id="live">
                        <div class="row g-4" id="liveMatches"></div>
                    </div>
                    
                    <!-- Completed Matches -->
                    <div class="tab-pane fade" id="completed">
                        <div class="row g-4" id="completedMatches"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

    <script>
        // Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyAZcAJNzY8nFZMD7ILuOArGmnjBeRRMgbo",
            authDomain: "ff-tournament-81d64.firebaseapp.com",
            projectId: "ff-tournament-81d64",
            storageBucket: "ff-tournament-81d64.firebasestorage.app",
            messagingSenderId: "171831529957",
            appId: "1:171831529957:web:833981b11c3383a9f49f0c"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        let currentUser = null;
        let userData = null;

        // Particles
        function createParticles() {
            for (let i = 0; i < 50; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                p.style.left = Math.random() * 100 + '%';
                p.style.animationDelay = Math.random() * 20 + 's';
                document.getElementById('particles').appendChild(p);
            }
        }
        createParticles();

        // Toast
        function showToast(msg, type = 'success') {
            const toast = document.createElement('div');
            toast.className = 'toast-notification';
            toast.innerHTML = `<i class="bi ${type === 'success' ? 'bi-check-circle' : 'bi-exclamation-circle'}"></i> ${msg}`;
            document.getElementById('toastContainer').appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        // Loading
        function showLoading(show) {
            document.getElementById('loadingOverlay').style.display = show ? 'flex' : 'none';
        }

        // Switch Tabs
        window.switchTab = (tab) => {
            if (tab === 'login') {
                document.getElementById('loginTab').classList.add('active');
                document.getElementById('registerTab').classList.remove('active');
                document.getElementById('loginForm').style.display = 'block';
                document.getElementById('registerForm').style.display = 'none';
            } else {
                document.getElementById('registerTab').classList.add('active');
                document.getElementById('loginTab').classList.remove('active');
                document.getElementById('registerForm').style.display = 'block';
                document.getElementById('loginForm').style.display = 'none';
            }
        };

        // Login
        window.handleLogin = async () => {
            const email = document.getElementById('loginEmail').value;
            const pass = document.getElementById('loginPassword').value;
            if (!email || !pass) return showToast('Fill all fields', 'error');
            showLoading(true);
            try {
                await auth.signInWithEmailAndPassword(email, pass);
                showToast('Login successful!');
            } catch (error) {
                showToast(error.message, 'error');
            } finally {
                showLoading(false);
            }
        };

        // Register
        window.handleRegister = async () => {
            const email = document.getElementById('regEmail').value;
            const pass = document.getElementById('regPassword').value;
            const referral = document.getElementById('regReferral').value;

            if (!email || !pass) return showToast('Fill all fields', 'error');
            if (pass.length < 6) return showToast('Password min 6 chars', 'error');

            showLoading(true);
            try {
                const result = await auth.createUserWithEmailAndPassword(email, pass);
                const referralCode = 'FF' + Math.random().toString(36).substring(2, 8).toUpperCase();
                
                await db.collection('users').doc(result.user.uid).set({
                    email: email,
                    wallet: 20,
                    matchesPlayed: 0,
                    gameUID: '',
                    referralCode: referralCode,
                    referredBy: referral || null,
                    referralCount: 0,
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                });

                if (referral) {
                    const referrerQuery = await db.collection('users').where('referralCode', '==', referral).get();
                    if (!referrerQuery.empty) {
                        await referrerQuery.docs[0].ref.update({
                            wallet: firebase.firestore.FieldValue.increment(30),
                            referralCount: firebase.firestore.FieldValue.increment(1)
                        });
                    }
                }

                showToast('Registration successful! ₹20 bonus added!');
            } catch (error) {
                showToast(error.message, 'error');
            } finally {
                showLoading(false);
            }
        };

        // Set Game UID
        window.setGameUid = async () => {
            if (!currentUser) return;
            const uid = document.getElementById('gameUidInput').value;
            if (!uid) return showToast('Enter UID', 'error');
            
            showLoading(true);
            try {
                await db.collection('users').doc(currentUser.uid).update({ gameUID: uid });
                showToast('UID saved!');
                loadUserData();
            } catch (error) {
                showToast(error.message, 'error');
            } finally {
                showLoading(false);
            }
        };

        // Deposit
        window.requestDeposit = async () => {
            if (!currentUser) return;
            const amount = parseInt(document.getElementById('depositAmount').value);
            const refId = document.getElementById('upiRefId').value;

            if (!amount || !refId) return showToast('Fill all fields', 'error');
            if (amount < 10 || amount > 500) return showToast('Amount ₹10-500', 'error');

            showLoading(true);
            try {
                await db.collection('deposit_requests').add({
                    userId: currentUser.uid,
                    userEmail: currentUser.email,
                    amount: amount,
                    refId: refId,
                    status: 'pending',
                    timestamp: firebase.firestore.FieldValue.serverTimestamp()
                });
                showToast('Deposit request sent!');
                document.getElementById('depositAmount').value = '';
                document.getElementById('upiRefId').value = '';
            } catch (error) {
                showToast(error.message, 'error');
            } finally {
                showLoading(false);
            }
        };

        // Withdraw
        window.requestWithdraw = async () => {
            if (!currentUser || !userData) return;
            const amount = parseInt(document.getElementById('withdrawAmount').value);
            const upi = document.getElementById('withdrawUpi').value;

            if (!amount || !upi) return showToast('Fill all fields', 'error');
            if (amount > userData.wallet) return showToast('Insufficient balance', 'error');

            showLoading(true);
            try {
                await db.collection('withdraw_requests').add({
                    userId: currentUser.uid,
                    userEmail: currentUser.email,
                    amount: amount,
                    upiId: upi,
                    status: 'pending',
                    timestamp: firebase.firestore.FieldValue.serverTimestamp()
                });
                showToast('Withdrawal request sent!');
                document.getElementById('withdrawAmount').value = '';
                document.getElementById('withdrawUpi').value = '';
            } catch (error) {
                showToast(error.message, 'error');
            } finally {
                showLoading(false);
            }
        };

        // Join Match
        window.joinMatch = async (matchId, entryFee) => {
            if (!currentUser || !userData) return showToast('Login first', 'error');
            if (!userData.gameUID) return showToast('Set Game UID first', 'error');
            if (userData.wallet < entryFee) return showToast('Insufficient balance', 'error');

            showLoading(true);
            try {
                const matchRef = db.collection('matches').doc(matchId);
                const userRef = db.collection('users').doc(currentUser.uid);

                await db.runTransaction(async (transaction) => {
                    const matchDoc = await transaction.get(matchRef);
                    const userDoc = await transaction.get(userRef);

                    if (!matchDoc.exists) throw 'Match not found';
                    const matchData = matchDoc.data();
                    
                    if (matchData.status !== 'waiting') throw 'Match not available';
                    
                    const maxPlayers = matchData.type === '1v1' ? 2 : 4;
                    if (matchData.players && matchData.players.length >= maxPlayers) throw 'Match full';

                    transaction.update(userRef, {
                        wallet: firebase.firestore.FieldValue.increment(-entryFee)
                    });

                    transaction.update(matchRef, {
                        players: firebase.firestore.FieldValue.arrayUnion(currentUser.uid)
                    });
                });

                showToast('Joined match successfully!');
                loadAllMatches();
                loadUserData();
            } catch (error) {
                showToast(error.toString(), 'error');
            } finally {
                showLoading(false);
            }
        };

        // Check if user joined a match
        function hasUserJoined(players) {
            return currentUser && players && players.includes(currentUser.uid);
        }

        // Copy Referral
        window.copyReferral = () => {
            const code = document.getElementById('referralCode').innerText;
            navigator.clipboard.writeText(code);
            showToast('Referral code copied!');
        };

        // Share on WhatsApp
        window.shareWhatsApp = () => {
            const code = document.getElementById('referralCode').innerText;
            const text = `Join Free Fire Tournament and get ₹20 bonus! Use my referral code: ${code} Download app: ${window.location.href}`;
            const url = `https://wa.me/?text=${encodeURIComponent(text)}`;
            window.open(url, '_blank');
        };

        // Load User Data
        async function loadUserData() {
            if (!currentUser) return;
            const doc = await db.collection('users').doc(currentUser.uid).get();
            if (doc.exists) {
                userData = doc.data();
                document.getElementById('userEmail').innerText = currentUser.email;
                document.getElementById('userGameUid').innerText = userData.gameUID || 'Not Set';
                document.getElementById('walletBalance').innerText = userData.wallet || 0;
                document.getElementById('matchesPlayed').innerText = userData.matchesPlayed || 0;
                document.getElementById('referralCount').innerText = userData.referralCount || 0;
                document.getElementById('referralCode').innerText = userData.referralCode || '';
            }
        }

        // Load All Matches (Waiting, Live, Completed)
        async function loadAllMatches() {
            const snapshot = await db.collection('matches').orderBy('createdAt', 'desc').get();
            
            let waitingHtml = '';
            let liveHtml = '';
            let completedHtml = '';

            snapshot.forEach(doc => {
                const m = doc.data();
                const maxPlayers = m.type === '1v1' ? 2 : 4;
                const currentPlayers = m.players ? m.players.length : 0;
                const joined = hasUserJoined(m.players);

                const matchCard = `
                    <div class="col-md-6 col-lg-4">
                        <div class="match-card ${m.status}">
                            <div class="d-flex justify-content-between">
                                <h5>${m.type}</h5>
                                <span class="status-${m.status}">${m.status.toUpperCase()}</span>
                            </div>
                            <p><i class="bi bi-trophy"></i> Prize: ₹${m.prize}</p>
                            <p><i class="bi bi-tag"></i> Entry: ₹${m.entryFee}</p>
                            <p><i class="bi bi-people"></i> Players: ${currentPlayers}/${maxPlayers}</p>
                            
                            ${joined && m.status === 'live' && m.roomId ? `
                                <div class="room-card">
                                    <h6 class="text-info">🎮 ROOM DETAILS</h6>
                                    <div class="room-detail">ID: ${m.roomId}</div>
                                    <div class="room-detail">Pass: ${m.roomPassword}</div>
                                </div>
                            ` : ''}
                            
                            ${m.status === 'waiting' && !joined ? `
                                <button class="btn-gradient w-100 mt-3" onclick="joinMatch('${doc.id}', ${m.entryFee})">
                                    Join Now
                                </button>
                            ` : ''}
                            
                            ${joined ? '<p class="text-success mt-2"><i class="bi bi-check-circle"></i> You joined</p>' : ''}
                            
                            ${m.winner ? '<p class="text-warning"><i class="bi bi-crown"></i> Winner declared</p>' : ''}
                        </div>
                    </div>
                `;

                if (m.status === 'waiting') waitingHtml += matchCard;
                else if (m.status === 'live') liveHtml += matchCard;
                else if (m.status === 'completed') completedHtml += matchCard;
            });

            document.getElementById('waitingMatches').innerHTML = waitingHtml || '<p class="text-center">No waiting matches</p>';
            document.getElementById('liveMatches').innerHTML = liveHtml || '<p class="text-center">No live matches</p>';
            document.getElementById('completedMatches').innerHTML = completedHtml || '<p class="text-center">No completed matches</p>';
        }

        // Logout
        window.logout = () => auth.signOut();

        // Auth Observer
        auth.onAuthStateChanged(async (user) => {
            if (user) {
                currentUser = user;
                document.getElementById('authSection').style.display = 'none';
                document.getElementById('dashboardSection').style.display = 'block';
                
                // Check/Create user doc
                const userDoc = await db.collection('users').doc(user.uid).get();
                if (!userDoc.exists) {
                    await db.collection('users').doc(user.uid).set({
                        email: user.email,
                        wallet: 20,
                        matchesPlayed: 0,
                        gameUID: '',
                        referralCode: 'FF' + Math.random().toString(36).substring(2, 8).toUpperCase(),
                        referralCount: 0,
                        createdAt: firebase.firestore.FieldValue.serverTimestamp()
                    });
                }
                
                await loadUserData();
                await loadAllMatches();

                // Real-time listeners
                db.collection('users').doc(user.uid).onSnapshot(() => loadUserData());
                db.collection('matches').onSnapshot(() => loadAllMatches());
            } else {
                currentUser = null;
                document.getElementById('authSection').style.display = 'block';
                document.getElementById('dashboardSection').style.display = 'none';
            }
        });
    </script>
</body>
</html>
