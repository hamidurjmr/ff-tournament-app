<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>FF TOURNAMENT • ELITE</title>
    
    <!-- Bootstrap 5 + Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: #030514;
            color: #fff;
            min-height: 100vh;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(circle at 20% 30%, rgba(0, 255, 255, 0.1) 0%, transparent 30%),
                        radial-gradient(circle at 80% 70%, rgba(255, 0, 255, 0.1) 0%, transparent 30%),
                        linear-gradient(135deg, #0a0f1f 0%, #1a1f35 100%);
            z-index: -1;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        .glass-card {
            background: rgba(10, 20, 30, 0.7);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(0, 255, 255, 0.2);
            border-radius: 35px;
            padding: 25px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            margin-bottom: 20px;
        }

        .profile-card {
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 35px;
            padding: 30px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: rgba(0, 0, 0, 0.4);
            border-radius: 25px;
            padding: 20px;
            text-align: center;
            border-left: 5px solid cyan;
        }

        .match-card {
            background: linear-gradient(145deg, #1a2639, #0d1a2b);
            border-radius: 30px;
            padding: 25px;
            border: 2px solid cyan;
            margin-bottom: 20px;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.3);
            transition: all 0.3s;
            height: 100%;
        }

        .btn-join {
            background: linear-gradient(135deg, #00f2fe, #4facfe);
            border: none;
            color: #030514;
            font-weight: 700;
            padding: 12px 25px;
            border-radius: 50px;
            width: 100%;
            cursor: pointer;
            font-size: 18px;
            transition: all 0.3s;
        }

        .btn-join:hover {
            transform: scale(1.05);
            box-shadow: 0 0 30px cyan;
        }

        .badge {
            padding: 8px 20px;
            border-radius: 50px;
            font-weight: 700;
            display: inline-block;
        }

        .badge-waiting {
            background: #f7971e;
            color: black;
        }

        .badge-live {
            background: #00ff88;
            color: black;
            animation: pulse 1.5s infinite;
        }

        .badge-completed {
            background: #ff416c;
            color: white;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.7; box-shadow: 0 0 20px cyan; }
            100% { opacity: 1; }
        }

        .tab-elite {
            background: rgba(0, 0, 0, 0.4);
            border-radius: 60px;
            padding: 5px;
            display: flex;
            gap: 5px;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }

        .tab-elite button {
            flex: 1;
            padding: 15px;
            border: none;
            background: transparent;
            color: #aaa;
            border-radius: 55px;
            font-weight: 600;
            min-width: 100px;
        }

        .tab-elite button.active {
            background: linear-gradient(135deg, cyan, #00ff88);
            color: #030514;
        }

        .room-details {
            background: linear-gradient(135deg, #00b4db, #0083b0);
            border-radius: 20px;
            padding: 20px;
            margin-top: 15px;
            text-align: center;
            border: 2px solid cyan;
        }

        .input-elite {
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(0, 255, 255, 0.3);
            border-radius: 50px;
            padding: 15px 20px;
            color: white;
            width: 100%;
            margin-bottom: 15px;
        }

        .input-elite:focus {
            outline: none;
            border-color: cyan;
            box-shadow: 0 0 30px cyan;
        }

        .toast {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 15px 25px;
            background: rgba(0, 0, 0, 0.9);
            border-left: 5px solid #00ff88;
            border-radius: 10px;
            color: white;
            z-index: 9999;
            animation: slideIn 0.3s;
        }

        @keyframes slideIn {
            from { transform: translateX(100%); }
            to { transform: translateX(0); }
        }

        .loading {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 99999;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid rgba(0,255,255,0.1);
            border-top: 5px solid cyan;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .empty-state {
            text-align: center;
            padding: 50px;
            color: #666;
        }

        .empty-state i {
            font-size: 60px;
            color: cyan;
            opacity: 0.5;
        }

        /* Share Buttons Container */
        .share-buttons {
            display: flex;
            gap: 10px;
            margin-top: 15px;
            flex-wrap: wrap;
        }

        .share-btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 50px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            min-width: 120px;
        }

        .share-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 20px rgba(0,0,0,0.3);
        }

        .share-btn.whatsapp {
            background: #25D366;
            color: white;
        }

        .share-btn.whatsapp:hover {
            background: #128C7E;
        }

        .share-btn.telegram {
            background: #0088cc;
            color: white;
        }

        .share-btn.telegram:hover {
            background: #006699;
        }

        .share-btn.facebook {
            background: #1877f2;
            color: white;
        }

        .share-btn.facebook:hover {
            background: #0e5ab5;
        }

        .share-btn.twitter {
            background: #1DA1F2;
            color: white;
        }

        .share-btn.twitter:hover {
            background: #0c85d0;
        }

        .share-btn.copy {
            background: #6c757d;
            color: white;
        }

        .share-btn.copy:hover {
            background: #5a6268;
        }

        .share-btn.more {
            background: #28a745;
            color: white;
        }

        .share-btn.more:hover {
            background: #1e7e34;
        }

        /* Referral Box */
        .referral-box {
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 30px;
            padding: 25px;
            position: relative;
            overflow: hidden;
        }

        .referral-code {
            font-size: 32px;
            font-weight: bold;
            letter-spacing: 2px;
            background: rgba(0,0,0,0.3);
            padding: 10px 20px;
            border-radius: 50px;
            display: inline-block;
            margin: 10px 0;
            border: 2px solid cyan;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Toast Container -->
        <div id="toastContainer"></div>

        <!-- Loading -->
        <div id="loading" class="loading" style="display: none;">
            <div class="spinner"></div>
        </div>

        <!-- Login Section (same as before) -->
        <div id="loginSection" class="glass-card" style="max-width: 500px; margin: 50px auto;">
            <div class="text-center mb-4">
                <i class="bi bi-controller" style="font-size: 60px; color: cyan;"></i>
                <h2>FF TOURNAMENT</h2>
            </div>

            <div class="tab-elite mb-4">
                <button class="active" onclick="showLoginTab('login')" id="loginTabBtn">LOGIN</button>
                <button onclick="showLoginTab('register')" id="registerTabBtn">REGISTER</button>
            </div>

            <div id="loginForm">
                <input type="email" id="loginEmail" class="input-elite" placeholder="Email" value="test@test.com">
                <input type="password" id="loginPassword" class="input-elite" placeholder="Password" value="123456">
                <button class="btn-join" onclick="handleLogin()">LOGIN</button>
            </div>

            <div id="registerForm" style="display: none;">
                <input type="email" id="regEmail" class="input-elite" placeholder="Email">
                <input type="password" id="regPassword" class="input-elite" placeholder="Password">
                <input type="text" id="regReferral" class="input-elite" placeholder="Referral Code">
                <button class="btn-join" onclick="handleRegister()">REGISTER</button>
            </div>
        </div>

        <!-- Dashboard -->
        <div id="dashboardSection" style="display: none;">
            <!-- Profile Card -->
            <div class="profile-card d-flex justify-content-between align-items-center">
                <div>
                    <h2><i class="bi bi-person-circle"></i> <span id="userEmail"></span></h2>
                    <p>Game UID: <strong id="userGameUid">Not Set</strong></p>
                </div>
                <button class="btn btn-outline-light" onclick="logout()">LOGOUT</button>
            </div>

            <!-- Stats -->
            <div class="row g-4 mb-4">
                <div class="col-md-4">
                    <div class="stat-card">
                        <h3>WALLET</h3>
                        <h2 style="color: #00ff88;">₹<span id="walletBalance">0</span></h2>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="stat-card">
                        <h3>MATCHES</h3>
                        <h2 style="color: gold;" id="matchesPlayed">0</h2>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="stat-card">
                        <h3>REFERRALS</h3>
                        <h2 style="color: cyan;" id="referralCount">0</h2>
                    </div>
                </div>
            </div>

            <!-- Actions -->
            <div class="row g-4 mb-4">
                <div class="col-md-3">
                    <div class="glass-card">
                        <h5>SET GAME UID</h5>
                        <input type="text" id="gameUidInput" class="input-elite" placeholder="Enter UID">
                        <button class="btn-join" onclick="setGameUid()">SAVE</button>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="glass-card">
                        <h5>ADD FUNDS</h5>
                        <p class="text-info">UPI: uddin6@fam</p>
                        <input type="number" id="depositAmount" class="input-elite" placeholder="₹10-500">
                        <input type="text" id="upiRefId" class="input-elite" placeholder="UPI Ref ID">
                        <button class="btn-join" onclick="requestDeposit()">DEPOSIT</button>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="glass-card">
                        <h5>WITHDRAW</h5>
                        <input type="number" id="withdrawAmount" class="input-elite" placeholder="Amount">
                        <input type="text" id="withdrawUpi" class="input-elite" placeholder="Your UPI">
                        <button class="btn-join" onclick="requestWithdraw()">WITHDRAW</button>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="referral-box">
                        <h5><i class="bi bi-gift"></i> REFER & EARN</h5>
                        <div class="referral-code" id="referralCodeDisplay">FFXXXX</div>
                        
                        <!-- FIXED: Share Buttons - ALL WORKING NOW -->
                        <div class="share-buttons">
                            <button class="share-btn whatsapp" onclick="shareViaWhatsApp()">
                                <i class="bi bi-whatsapp"></i> WhatsApp
                            </button>
                            <button class="share-btn telegram" onclick="shareViaTelegram()">
                                <i class="bi bi-telegram"></i> Telegram
                            </button>
                            <button class="share-btn facebook" onclick="shareViaFacebook()">
                                <i class="bi bi-facebook"></i> Facebook
                            </button>
                            <button class="share-btn twitter" onclick="shareViaTwitter()">
                                <i class="bi bi-twitter-x"></i> Twitter
                            </button>
                            <button class="share-btn copy" onclick="copyReferralCode()">
                                <i class="bi bi-files"></i> Copy
                            </button>
                            <button class="share-btn more" onclick="shareViaMore()">
                                <i class="bi bi-share"></i> More
                            </button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Tournaments -->
            <div class="glass-card">
                <h2 class="mb-4"><i class="bi bi-trophy-fill text-warning"></i> TOURNAMENTS</h2>
                
                <div class="tab-elite">
                    <button class="active" onclick="showMatchTab('waiting')" id="waitingTabBtn">WAITING</button>
                    <button onclick="showMatchTab('live')" id="liveTabBtn">LIVE</button>
                    <button onclick="showMatchTab('completed')" id="completedTabBtn">COMPLETED</button>
                </div>

                <div id="waitingMatches" class="row g-4"></div>
                <div id="liveMatches" class="row g-4" style="display: none;"></div>
                <div id="completedMatches" class="row g-4" style="display: none;"></div>
            </div>
        </div>
    </div>

    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

    <script>
        // Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyAZcAJNzY8nFZMD7ILuOArGmnjBeRRMgbo",
            authDomain: "ff-tournament-81d64.firebaseapp.com",
            projectId: "ff-tournament-81d64",
            storageBucket: "ff-tournament-81d64.firebasestorage.app",
            messagingSenderId: "171831529957",
            appId: "1:171831529957:web:833981b11c3383a9f49f0c"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        let currentUser = null;
        let userData = null;

        // Toast
        function showToast(msg, type = 'success') {
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.style.borderLeftColor = type === 'success' ? '#00ff88' : '#ff416c';
            toast.innerHTML = msg;
            document.getElementById('toastContainer').appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        // Loading
        function showLoading(show) {
            document.getElementById('loading').style.display = show ? 'flex' : 'none';
        }

        // ============================================
        // 🔥 FIXED: SHARE FUNCTIONS - ALL WORKING NOW
        // ============================================

        // Get referral code
        function getReferralCode() {
            return document.getElementById('referralCodeDisplay').innerText;
        }

        // Get share message
        function getShareMessage() {
            const code = getReferralCode();
            const appUrl = window.location.href;
            return `🎮 Join Free Fire Tournament and get ₹20 bonus!\n\n✨ Use my referral code: ${code}\n\n📱 Download App: ${appUrl}`;
        }

        // 1️⃣ WhatsApp Share
        window.shareViaWhatsApp = function() {
            const text = getShareMessage();
            const url = `https://wa.me/?text=${encodeURIComponent(text)}`;
            window.open(url, '_blank');
            showToast('Opening WhatsApp...');
        };

        // 2️⃣ Telegram Share
        window.shareViaTelegram = function() {
            const text = getShareMessage();
            const url = `https://t.me/share/url?url=${encodeURIComponent(window.location.href)}&text=${encodeURIComponent(text)}`;
            window.open(url, '_blank');
            showToast('Opening Telegram...');
        };

        // 3️⃣ Facebook Share
        window.shareViaFacebook = function() {
            const url = `https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(window.location.href)}&quote=${encodeURIComponent(getShareMessage())}`;
            window.open(url, '_blank', 'width=600,height=400');
            showToast('Opening Facebook...');
        };

        // 4️⃣ Twitter/X Share
        window.shareViaTwitter = function() {
            const text = getShareMessage();
            const url = `https://twitter.com/intent/tweet?text=${encodeURIComponent(text)}`;
            window.open(url, '_blank');
            showToast('Opening Twitter...');
        };

        // 5️⃣ Copy Referral Code
        window.copyReferralCode = function() {
            const code = getReferralCode();
            navigator.clipboard.writeText(code).then(() => {
                showToast('✅ Referral code copied to clipboard!');
            }).catch(() => {
                // Fallback
                const textarea = document.createElement('textarea');
                textarea.value = code;
                document.body.appendChild(textarea);
                textarea.select();
                document.execCommand('copy');
                document.body.removeChild(textarea);
                showToast('✅ Referral code copied!');
            });
        };

        // 6️⃣ More Share Options (Native Share)
        window.shareViaMore = function() {
            if (navigator.share) {
                navigator.share({
                    title: 'FF Tournament',
                    text: getShareMessage(),
                    url: window.location.href,
                }).then(() => {
                    showToast('Shared successfully!');
                }).catch((error) => {
                    if (error.name !== 'AbortError') {
                        showToast('Share cancelled', 'error');
                    }
                });
            } else {
                // Fallback - copy full message
                const fullMessage = getShareMessage() + '\n\n' + window.location.href;
                navigator.clipboard.writeText(fullMessage).then(() => {
                    showToast('📋 Full message copied to clipboard!');
                });
            }
        };

        // Login/Register functions (same as before)
        function showLoginTab(tab) {
            if (tab === 'login') {
                document.getElementById('loginTabBtn').classList.add('active');
                document.getElementById('registerTabBtn').classList.remove('active');
                document.getElementById('loginForm').style.display = 'block';
                document.getElementById('registerForm').style.display = 'none';
            } else {
                document.getElementById('registerTabBtn').classList.add('active');
                document.getElementById('loginTabBtn').classList.remove('active');
                document.getElementById('registerForm').style.display = 'block';
                document.getElementById('loginForm').style.display = 'none';
            }
        }

        window.handleLogin = async () => {
            const email = document.getElementById('loginEmail').value;
            const pass = document.getElementById('loginPassword').value;
            if (!email || !pass) return showToast('Fill all fields', 'error');
            showLoading(true);
            try {
                await auth.signInWithEmailAndPassword(email, pass);
                showToast('Login successful!');
            } catch (error) {
                showToast(error.message, 'error');
            } finally {
                showLoading(false);
            }
        };

        window.handleRegister = async () => {
            const email = document.getElementById('regEmail').value;
            const pass = document.getElementById('regPassword').value;
            const referral = document.getElementById('regReferral').value;
            if (!email || !pass) return showToast('Fill all fields', 'error');
            showLoading(true);
            try {
                const result = await auth.createUserWithEmailAndPassword(email, pass);
                const referralCode = 'FF' + Math.random().toString(36).substring(2, 8).toUpperCase();
                await db.collection('users').doc(result.user.uid).set({
                    email: email,
                    wallet: 20,
                    matchesPlayed: 0,
                    gameUID: '',
                    referralCode: referralCode,
                    referredBy: referral || null,
                    referralCount: 0,
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                });
                showToast('Registration successful!');
            } catch (error) {
                showToast(error.message, 'error');
            } finally {
                showLoading(false);
            }
        };

        window.setGameUid = async () => {
            if (!currentUser) return;
            const uid = document.getElementById('gameUidInput').value;
            if (!uid) return showToast('Enter UID', 'error');
            showLoading(true);
            try {
                await db.collection('users').doc(currentUser.uid).update({ gameUID: uid });
                showToast('UID saved!');
                loadUserData();
            } catch (error) {
                showToast(error.message, 'error');
            } finally {
                showLoading(false);
            }
        };

        window.requestDeposit = async () => {
            if (!currentUser) return;
            const amount = parseInt(document.getElementById('depositAmount').value);
            const refId = document.getElementById('upiRefId').value;
            if (!amount || !refId) return showToast('Fill all fields', 'error');
            if (amount < 10 || amount > 500) return showToast('Amount ₹10-500', 'error');
            showLoading(true);
            try {
                await db.collection('deposit_requests').add({
                    userId: currentUser.uid,
                    userEmail: currentUser.email,
                    amount: amount,
                    refId: refId,
                    status: 'pending',
                    timestamp: firebase.firestore.FieldValue.serverTimestamp()
                });
                showToast('Deposit request sent!');
                document.getElementById('depositAmount').value = '';
                document.getElementById('upiRefId').value = '';
            } catch (error) {
                showToast(error.message, 'error');
            } finally {
                showLoading(false);
            }
        };

        window.requestWithdraw = async () => {
            if (!currentUser || !userData) return;
            const amount = parseInt(document.getElementById('withdrawAmount').value);
            const upi = document.getElementById('withdrawUpi').value;
            if (!amount || !upi) return showToast('Fill all fields', 'error');
            if (amount > userData.wallet) return showToast('Insufficient balance', 'error');
            showLoading(true);
            try {
                await db.runTransaction(async (tx) => {
                    const userRef = db.collection('users').doc(currentUser.uid);
                    const user = await tx.get(userRef);
                    if (user.data().wallet < amount) throw 'Insufficient';
                    tx.update(userRef, { wallet: firebase.firestore.FieldValue.increment(-amount) });
                    await db.collection('withdraw_requests').add({
                        userId: currentUser.uid,
                        userEmail: currentUser.email,
                        amount: amount,
                        upiId: upi,
                        status: 'pending',
                        timestamp: firebase.firestore.FieldValue.serverTimestamp()
                    });
                });
                showToast('Withdrawal request sent!');
                document.getElementById('withdrawAmount').value = '';
                document.getElementById('withdrawUpi').value = '';
                loadUserData();
            } catch (error) {
                showToast(error.toString(), 'error');
            } finally {
                showLoading(false);
            }
        };

        window.joinMatch = async (matchId, entryFee) => {
            if (!currentUser || !userData) return showToast('Login first', 'error');
            if (!userData.gameUID) return showToast('Set Game UID first', 'error');
            if (userData.wallet < entryFee) return showToast('Insufficient balance', 'error');
            showLoading(true);
            try {
                await db.runTransaction(async (tx) => {
                    const matchRef = db.collection('matches').doc(matchId);
                    const userRef = db.collection('users').doc(currentUser.uid);
                    const match = await tx.get(matchRef);
                    const user = await tx.get(userRef);
                    if (!match.exists) throw 'Match not found';
                    if (match.data().status !== 'waiting') throw 'Match not available';
                    const max = match.data().type === '1v1' ? 2 : 4;
                    if (match.data().players?.length >= max) throw 'Match full';
                    tx.update(userRef, { wallet: firebase.firestore.FieldValue.increment(-entryFee) });
                    tx.update(matchRef, { players: firebase.firestore.FieldValue.arrayUnion(currentUser.uid) });
                });
                showToast('Joined match!');
                loadMatches();
                loadUserData();
            } catch (error) {
                showToast(error.toString(), 'error');
            } finally {
                showLoading(false);
            }
        };

        function showMatchTab(tab) {
            document.getElementById('waitingTabBtn').classList.remove('active');
            document.getElementById('liveTabBtn').classList.remove('active');
            document.getElementById('completedTabBtn').classList.remove('active');
            document.getElementById('waitingMatches').style.display = 'none';
            document.getElementById('liveMatches').style.display = 'none';
            document.getElementById('completedMatches').style.display = 'none';
            if (tab === 'waiting') {
                document.getElementById('waitingTabBtn').classList.add('active');
                document.getElementById('waitingMatches').style.display = 'flex';
            } else if (tab === 'live') {
                document.getElementById('liveTabBtn').classList.add('active');
                document.getElementById('liveMatches').style.display = 'flex';
            } else {
                document.getElementById('completedTabBtn').classList.add('active');
                document.getElementById('completedMatches').style.display = 'flex';
            }
        }

        async function loadUserData() {
            if (!currentUser) return;
            const doc = await db.collection('users').doc(currentUser.uid).get();
            if (doc.exists) {
                userData = doc.data();
                document.getElementById('userEmail').innerText = currentUser.email;
                document.getElementById('userGameUid').innerText = userData.gameUID || 'Not Set';
                document.getElementById('walletBalance').innerText = userData.wallet || 0;
                document.getElementById('matchesPlayed').innerText = userData.matchesPlayed || 0;
                document.getElementById('referralCount').innerText = userData.referralCount || 0;
                document.getElementById('referralCodeDisplay').innerText = userData.referralCode || 'FF0000';
            }
        }

        async function loadMatches() {
            try {
                const snapshot = await db.collection('matches').orderBy('createdAt', 'desc').get();
                let waitingHtml = '', liveHtml = '', completedHtml = '';
                snapshot.forEach(doc => {
                    const m = doc.data();
                    const maxPlayers = m.type === '1v1' ? 2 : 4;
                    const currentPlayers = m.players ? m.players.length : 0;
                    const joined = currentUser && m.players && m.players.includes(currentUser.uid);
                    
                    const matchCard = `
                        <div class="col-md-6 col-lg-4">
                            <div class="match-card">
                                <div class="d-flex justify-content-between mb-3">
                                    <h3>${m.type === '1v1' ? '⚔️ 1V1' : '👥 2V2'}</h3>
                                    <span class="badge-${m.status}">${m.status.toUpperCase()}</span>
                                </div>
                                <div class="prize">🏆 ₹${m.prize}</div>
                                <div class="entry">💰 Entry: ₹${m.entryFee}</div>
                                <div class="players">👥 Players: ${currentPlayers}/${maxPlayers}</div>
                                ${joined && m.status === 'live' && m.roomId ? `
                                    <div class="room-details mt-3">
                                        <div>🎮 Room: ${m.roomId}</div>
                                        <div>🔑 Pass: ${m.roomPassword}</div>
                                    </div>
                                ` : ''}
                                ${joined ? '<p class="text-success mt-2">✓ You joined</p>' : ''}
                                ${m.status === 'waiting' && !joined ? `
                                    <button class="btn-join mt-3" onclick="joinMatch('${doc.id}', ${m.entryFee})">JOIN NOW</button>
                                ` : ''}
                                ${m.winner ? '<p class="text-warning mt-2">🏆 Winner declared</p>' : ''}
                            </div>
                        </div>
                    `;
                    if (m.status === 'waiting') waitingHtml += matchCard;
                    else if (m.status === 'live') liveHtml += matchCard;
                    else if (m.status === 'completed') completedHtml += matchCard;
                });
                document.getElementById('waitingMatches').innerHTML = waitingHtml || '<div class="col-12"><div class="empty-state">No waiting matches</div></div>';
                document.getElementById('liveMatches').innerHTML = liveHtml || '<div class="col-12"><div class="empty-state">No live matches</div></div>';
                document.getElementById('completedMatches').innerHTML = completedHtml || '<div class="col-12"><div class="empty-state">No completed matches</div></div>';
            } catch (error) {
                console.error('Error loading matches:', error);
            }
        }

        window.logout = () => auth.signOut();

        auth.onAuthStateChanged(async (user) => {
            if (user) {
                currentUser = user;
                document.getElementById('loginSection').style.display = 'none';
                document.getElementById('dashboardSection').style.display = 'block';
                
                const userDoc = await db.collection('users').doc(user.uid).get();
                if (!userDoc.exists) {
                    await db.collection('users').doc(user.uid).set({
                        email: user.email,
                        wallet: 20,
                        matchesPlayed: 0,
                        gameUID: '',
                        referralCode: 'FF' + Math.random().toString(36).substring(2, 8).toUpperCase(),
                        referralCount: 0,
                        createdAt: firebase.firestore.FieldValue.serverTimestamp()
                    });
                }
                
                await loadUserData();
                await loadMatches();
                db.collection('matches').onSnapshot(() => loadMatches());
            } else {
                currentUser = null;
                document.getElementById('loginSection').style.display = 'block';
                document.getElementById('dashboardSection').style.display = 'none';
            }
        });

        window.onload = async () => {
            const matches = await db.collection('matches').limit(1).get();
            if (matches.empty) {
                await db.collection('matches').add({
                    type: '1v1',
                    entryFee: 20,
                    prize: 18,
                    status: 'waiting',
                    players: [],
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                });
                await db.collection('matches').add({
                    type: '2v2',
                    entryFee: 40,
                    prize: 37,
                    status: 'waiting',
                    players: [],
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                });
            }
        };
    </script>
</body>
</html>
