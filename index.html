<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>FF TOURNEY • USER PANEL</title>
  <!-- Font & Icons -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', sans-serif;
    }

    body {
      min-height: 100vh;
      background: radial-gradient(circle at 10% 20%, #1a1f2e, #0b0d17);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    /* glassmorphism base */
    .glass-card {
      background: rgba(20, 25, 40, 0.7);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(0, 255, 255, 0.2);
      border-radius: 28px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6), 0 0 20px rgba(0, 255, 255, 0.3);
      padding: 24px;
      transition: transform 0.25s ease, box-shadow 0.3s ease;
    }

    .glass-card:hover {
      box-shadow: 0 25px 50px rgba(0, 255, 255, 0.5), 0 0 30px #00ffff80;
      transform: translateY(-4px);
    }

    /* glowing button */
    .glow-btn {
      background: linear-gradient(145deg, #00c8ff, #0077ff);
      border: none;
      border-radius: 40px;
      padding: 12px 28px;
      font-weight: 600;
      color: white;
      text-transform: uppercase;
      letter-spacing: 1px;
      cursor: pointer;
      box-shadow: 0 0 15px #00a6ff, 0 4px 10px rgba(0,0,0,0.4);
      transition: all 0.2s ease;
      border: 1px solid rgba(255,255,255,0.3);
    }

    .glow-btn:hover {
      background: linear-gradient(145deg, #1ed5ff, #0088ff);
      box-shadow: 0 0 30px cyan, 0 6px 15px black;
      transform: scale(1.02);
    }

    .glow-btn:active { transform: scale(0.98); }

    /* neon text */
    .neon {
      color: #fff;
      text-shadow: 0 0 5px cyan, 0 0 15px blue;
    }

    /* layout */
    .app-container {
      width: 100%;
      max-width: 1200px;
      margin: 0 auto;
    }

    .auth-container, .dashboard {
      animation: fadeSlide 0.4s ease;
    }

    @keyframes fadeSlide {
      0% { opacity: 0; transform: translateY(20px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    /* tabs */
    .tab-bar {
      display: flex;
      gap: 16px;
      margin-bottom: 28px;
      justify-content: center;
    }

    .tab {
      background: transparent;
      border: 1px solid cyan;
      color: cyan;
      padding: 10px 32px;
      border-radius: 40px;
      font-weight: 600;
      cursor: pointer;
      backdrop-filter: blur(5px);
      transition: 0.2s;
    }

    .tab.active {
      background: cyan;
      color: #0a0f1f;
      box-shadow: 0 0 25px cyan;
    }

    input, textarea {
      width: 100%;
      background: rgba(10, 15, 30, 0.8);
      border: 1px solid #2a3f6e;
      border-radius: 40px;
      padding: 14px 20px;
      color: white;
      font-size: 16px;
      margin: 10px 0;
      outline: none;
      transition: 0.2s;
    }

    input:focus {
      border-color: cyan;
      box-shadow: 0 0 15px cyan;
    }

    .flex-row {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      align-items: center;
    }

    .user-info {
      display: flex;
      justify-content: space-between;
      flex-wrap: wrap;
      background: rgba(0, 255, 255, 0.08);
      border-radius: 40px;
      padding: 16px 24px;
      margin-bottom: 24px;
      border-left: 6px solid cyan;
    }

    .badge {
      background: #101624;
      border-radius: 40px;
      padding: 8px 18px;
      border: 1px solid cyan;
      font-weight: 600;
    }

    /* match cards */
    .match-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 24px;
      margin-top: 24px;
    }

    .match-card {
      background: rgba(16, 22, 40, 0.9);
      backdrop-filter: blur(10px);
      border-radius: 30px;
      padding: 22px 16px;
      border: 1px solid cyan;
      transition: all 0.25s;
      animation: cardGlow 3s infinite alternate;
    }

    @keyframes cardGlow {
      0% { box-shadow: 0 0 5px cyan; }
      100% { box-shadow: 0 0 25px deepskyblue; }
    }

    .loading-spinner {
      width: 48px;
      height: 48px;
      border: 5px solid rgba(0,255,255,0.2);
      border-top: 5px solid cyan;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 30px auto;
    }

    @keyframes spin { 0% { transform: rotate(0); } 100% { transform: rotate(360deg); } }

    .hidden { display: none !important; }

    /* responsive */
    @media (max-width: 600px) {
      .glass-card { padding: 18px; }
      .tab { padding: 8px 18px; }
    }
  </style>
</head>
<body>
  <div class="app-container" id="appContainer">
    <!-- LOADER -->
    <div id="globalLoader" class="loading-spinner" style="margin: 50px auto;"></div>

    <!-- AUTH SECTION (shown when logged out) -->
    <div id="authSection" class="auth-container glass-card hidden">
      <h1 class="neon" style="text-align: center; margin-bottom: 25px;"><i class="fas fa-crosshairs"></i> FF TOURNEY · LOGIN</h1>
      <div class="tab-bar">
        <button class="tab active" id="loginTabBtn">LOGIN</button>
        <button class="tab" id="registerTabBtn">REGISTER</button>
      </div>

      <!-- login form -->
      <div id="loginForm">
        <input type="email" id="loginEmail" placeholder="Email" autocomplete="off">
        <input type="password" id="loginPassword" placeholder="Password">
        <button class="glow-btn" style="width: 100%;" id="loginBtn"><i class="fas fa-sign-in-alt"></i> LOGIN</button>
      </div>

      <!-- register form (hidden) -->
      <div id="registerForm" class="hidden">
        <input type="email" id="regEmail" placeholder="Email">
        <input type="password" id="regPassword" placeholder="Password (min 6 chars)">
        <button class="glow-btn" style="width: 100%;" id="registerBtn"><i class="fas fa-user-plus"></i> REGISTER</button>
      </div>
      <p id="authMessage" style="color: #ffaa33; margin-top: 15px; text-align: center;"></p>
    </div>

    <!-- MAIN DASHBOARD (logged in) -->
    <div id="dashboardSection" class="dashboard hidden">
      <!-- profile header -->
      <div class="glass-card" style="margin-bottom: 24px;">
        <div class="user-info">
          <div><i class="fas fa-user-circle" style="color: cyan; font-size: 28px;"></i> <span id="userEmailDisplay">-</span></div>
          <div class="badge"><i class="fas fa-coins"></i> ₹<span id="walletBalance">0</span></div>
          <div class="badge"><i class="fas fa-gamepad"></i> <span id="matchesPlayed">0</span> matches</div>
          <button class="glow-btn" style="padding: 8px 24px;" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> LOGOUT</button>
        </div>
        <div class="flex-row" style="justify-content: space-between; margin-top: 8px;">
          <span><i class="fas fa-id-card"></i> UID: <span id="gameUidDisplay">not set</span></span>
          <button class="glow-btn" style="padding: 6px 20px;" id="editUidBtn"><i class="fas fa-pen"></i> SET UID</button>
        </div>
      </div>

      <!-- wallet & actions row -->
      <div class="flex-row" style="margin-bottom: 24px; gap: 16px;">
        <div class="glass-card" style="flex:1;">
          <h3><i class="fas fa-wallet"></i> ADD FUNDS (UPI)</h3>
          <p><i class="fas fa-qrcode"></i> UPI ID: <strong>uddin6@fam</strong></p>
          <input type="number" id="depositAmount" placeholder="₹10 - ₹500" min="10" max="500">
          <input type="text" id="upiRefId" placeholder="UPI reference ID (after payment)">
          <button class="glow-btn" style="width: 100%;" id="depositBtn"><i class="fas fa-arrow-up"></i> REQUEST DEPOSIT</button>
        </div>
        <div class="glass-card" style="flex:1;">
          <h3><i class="fas fa-money-bill-transfer"></i> WITHDRAW</h3>
          <input type="number" id="withdrawAmount" placeholder="Amount">
          <input type="text" id="withdrawUpi" placeholder="Your UPI ID">
          <button class="glow-btn" style="width: 100%;" id="withdrawBtn"><i class="fas fa-hand-holding-usd"></i> REQUEST</button>
        </div>
      </div>

      <!-- MATCHES TOURNAMENT SECTION -->
      <div class="glass-card">
        <h2 style="margin-bottom: 16px;"><i class="fas fa-trophy" style="color: gold;"></i> OPEN MATCHES</h2>
        <div id="matchesContainer" class="match-grid">
          <!-- dynamic cards from firestore -->
          <div class="loading-spinner" style="margin: 20px auto;"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- FIREBASE SDK (compat) -->
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

  <script>
    (function() {
      // Firebase config
      const firebaseConfig = {
        apiKey: "AIzaSyAZcAJNzY8nFZMD7ILuOArGmnjBeRRMgbo",
        authDomain: "ff-tournament-81d64.firebaseapp.com",
        projectId: "ff-tournament-81d64",
        storageBucket: "ff-tournament-81d64.firebasestorage.app",
        messagingSenderId: "171831529957",
        appId: "1:171831529957:web:833981b11c3383a9f49f0c"
      };
      firebase.initializeApp(firebaseConfig);
      const auth = firebase.auth();
      const db = firebase.firestore();

      // DOM elements
      const loader = document.getElementById('globalLoader');
      const authSection = document.getElementById('authSection');
      const dashboard = document.getElementById('dashboardSection');
      const loginTabBtn = document.getElementById('loginTabBtn');
      const registerTabBtn = document.getElementById('registerTabBtn');
      const loginFormDiv = document.getElementById('loginForm');
      const registerFormDiv = document.getElementById('registerForm');
      const authMsg = document.getElementById('authMessage');

      // user display fields
      const userEmailSpan = document.getElementById('userEmailDisplay');
      const walletSpan = document.getElementById('walletBalance');
      const matchesSpan = document.getElementById('matchesPlayed');
      const gameUidSpan = document.getElementById('gameUidDisplay');

      // state
      let currentUserDoc = null; // firestore user data
      let settingsCache = null;

      // ---------- UI TOGGLE ----------
      function showLoader(show) { loader.classList.toggle('hidden', !show); }
      function showAuth(show) { authSection.classList.toggle('hidden', !show); }
      function showDashboard(show) { dashboard.classList.toggle('hidden', !show); }

      loginTabBtn.addEventListener('click', () => {
        loginTabBtn.classList.add('active');
        registerTabBtn.classList.remove('active');
        loginFormDiv.classList.remove('hidden');
        registerFormDiv.classList.add('hidden');
      });
      registerTabBtn.addEventListener('click', () => {
        registerTabBtn.classList.add('active');
        loginTabBtn.classList.remove('active');
        registerFormDiv.classList.remove('hidden');
        loginFormDiv.classList.add('hidden');
      });

      // ---------- AUTH ----------
      document.getElementById('loginBtn').addEventListener('click', async () => {
        const email = document.getElementById('loginEmail').value.trim();
        const pass = document.getElementById('loginPassword').value;
        if (!email || !pass) return authMsg.innerText = 'Fill all fields';
        try {
          showLoader(true);
          await auth.signInWithEmailAndPassword(email, pass);
        } catch (e) {
          authMsg.innerText = e.message;
          showLoader(false);
        }
      });

      document.getElementById('registerBtn').addEventListener('click', async () => {
        const email = document.getElementById('regEmail').value.trim();
        const pass = document.getElementById('regPassword').value;
        if (!email || pass.length < 6) return authMsg.innerText = 'Password min 6 chars';
        try {
          showLoader(true);
          await auth.createUserWithEmailAndPassword(email, pass);
          // user doc will be created on first login trigger
        } catch (e) {
          authMsg.innerText = e.message;
          showLoader(false);
        }
      });

      document.getElementById('logoutBtn').addEventListener('click', () => auth.signOut());

      // ---------- FIRESTORE USER DOC HELPERS ----------
      async function getUserDoc(uid) {
        const ref = db.collection('users').doc(uid);
        const snap = await ref.get();
        if (!snap.exists) {
          // create default
          const newUser = {
            email: auth.currentUser.email,
            wallet: 0,
            matchesPlayed: 0,
            gameUID: '',
            bonus10Given: false,
            bonus20Given: false,
            createdAt: firebase.firestore.FieldValue.serverTimestamp()
          };
          await ref.set(newUser);
          return { ...newUser, uid };
        }
        return { ...snap.data(), uid };
      }

      async function updateUserDisplay() {
        if (!auth.currentUser) return;
        const user = await getUserDoc(auth.currentUser.uid);
        currentUserDoc = user;
        userEmailSpan.innerText = user.email;
        walletSpan.innerText = user.wallet || 0;
        matchesSpan.innerText = user.matchesPlayed || 0;
        gameUidSpan.innerText = user.gameUID || 'not set';
      }

      // ---------- LOAD SETTINGS ----------
      async function getSettings() {
        if (settingsCache) return settingsCache;
        const snap = await db.collection('settings').doc('config').get();
        if (!snap.exists) {
          const def = { entry1v1: 20, prize1v1: 18, entry2v2: 40, prize2v2: 37, minDeposit: 10, maxDeposit: 500 };
          await db.collection('settings').doc('config').set(def);
          settingsCache = def;
          return def;
        }
        settingsCache = snap.data();
        return snap.data();
      }

      // ---------- RENDER MATCHES ----------
      async function loadMatches() {
        const container = document.getElementById('matchesContainer');
        container.innerHTML = '<div class="loading-spinner" style="margin:20px auto;"></div>';
        try {
          const snapshot = await db.collection('matches').where('status', '==', 'waiting').get();
          if (snapshot.empty) {
            container.innerHTML = '<p style="color: #aaa; text-align:center;">🔥 No open matches. Check back later!</p>';
            return;
          }
          let html = '';
          snapshot.forEach(doc => {
            const m = doc.data();
            html += `
              <div class="match-card">
                <h3 style="color:cyan;">${m.type === '1v1' ? '⚔️ 1V1' : '👥 2V2'}</h3>
                <p><i class="fas fa-tag"></i> Entry: ₹${m.entryFee} | Prize: ₹${m.prize}</p>
                <p><i class="fas fa-users"></i> Players: ${m.players ? m.players.length : 0}/${m.type === '1v1' ? 2 : 4}</p>
                <button class="glow-btn join-match" data-id="${doc.id}" style="width:100%; margin-top:15px;">JOIN MATCH</button>
              </div>
            `;
          });
          container.innerHTML = html;
          document.querySelectorAll('.join-match').forEach(btn => btn.addEventListener('click', joinMatch));
        } catch (e) {
          container.innerHTML = `<p style="color:red;">Error: ${e.message}</p>`;
        }
      }

      // join match logic
      async function joinMatch(e) {
        const matchId = e.target.dataset.id;
        if (!currentUserDoc) return alert('User data not ready');
        if (!currentUserDoc.gameUID) return alert('Please set your Free Fire UID first!');

        const matchSnap = await db.collection('matches').doc(matchId).get();
        const match = matchSnap.data();
        if (!match || match.status !== 'waiting') return alert('Match not available');

        const entry = match.entryFee;
        if (currentUserDoc.wallet < entry) return alert('Insufficient wallet balance!');

        // check slots
        const players = match.players || [];
        const max = match.type === '1v1' ? 2 : 4;
        if (players.length >= max) return alert('Match full');

        // Firestore transaction: deduct wallet, add player
        const userRef = db.collection('users').doc(auth.currentUser.uid);
        const matchRef = db.collection('matches').doc(matchId);
        try {
          await db.runTransaction(async (transaction) => {
            const userSnap = await transaction.get(userRef);
            const matchSnapTrans = await transaction.get(matchRef);
            if (!userSnap.exists || !matchSnapTrans.exists) throw 'Data error';
            const userData = userSnap.data();
            const matchData = matchSnapTrans.data();
            if (userData.wallet < entry) throw 'Balance changed';
            if ((matchData.players?.length || 0) >= max) throw 'Match full now';
            transaction.update(userRef, { wallet: firebase.firestore.FieldValue.increment(-entry) });
            transaction.update(matchRef, { players: firebase.firestore.FieldValue.arrayUnion(auth.currentUser.uid) });
          });
          alert('Successfully joined match!');
          await updateUserDisplay();
          loadMatches();
        } catch (err) {
          alert('Join failed: ' + err.message);
        }
      }

      // set UID
      document.getElementById('editUidBtn').addEventListener('click', async () => {
        const newUid = prompt('Enter your Free Fire Game UID:');
        if (!newUid) return;
        if (!auth.currentUser) return;
        await db.collection('users').doc(auth.currentUser.uid).update({ gameUID: newUid });
        await updateUserDisplay();
      });

      // deposit
      document.getElementById('depositBtn').addEventListener('click', async () => {
        const amount = parseInt(document.getElementById('depositAmount').value);
        const refId = document.getElementById('upiRefId').value.trim();
        if (!refId) return alert('Enter UPI reference ID');
        const settings = await getSettings();
        if (amount < settings.minDeposit || amount > settings.maxDeposit) 
          return alert(`Amount must be ₹${settings.minDeposit} to ₹${settings.maxDeposit}`);
        await db.collection('deposit_requests').add({
          userId: auth.currentUser.uid,
          amount,
          refId,
          status: 'pending',
          timestamp: firebase.firestore.FieldValue.serverTimestamp()
        });
        alert('Deposit request sent to admin!');
        document.getElementById('depositAmount').value = '';
        document.getElementById('upiRefId').value = '';
      });

      // withdraw
      document.getElementById('withdrawBtn').addEventListener('click', async () => {
        const amount = parseInt(document.getElementById('withdrawAmount').value);
        const upi = document.getElementById('withdrawUpi').value.trim();
        if (!amount || !upi) return alert('Fill all');
        if (amount > currentUserDoc.wallet) return alert('Insufficient balance');
        await db.collection('withdraw_requests').add({
          userId: auth.currentUser.uid,
          amount,
          upiId: upi,
          status: 'pending',
          timestamp: firebase.firestore.FieldValue.serverTimestamp()
        });
        alert('Withdrawal request sent');
        document.getElementById('withdrawAmount').value = '';
        document.getElementById('withdrawUpi').value = '';
      });

      // ---------- AUTH STATE OBSERVER ----------
      auth.onAuthStateChanged(async (user) => {
        showLoader(false);
        if (user) {
          showAuth(false);
          showDashboard(true);
          await updateUserDisplay();
          await loadMatches();
          // realtime listener for user wallet updates
          db.collection('users').doc(user.uid).onSnapshot(() => updateUserDisplay());
        } else {
          showAuth(true);
          showDashboard(false);
          currentUserDoc = null;
        }
      });

      // initialize settings existence
      window.onload = async () => {
        showLoader(true);
        await getSettings(); // pre-create default config if missing
        showLoader(false);
      };
    })();
  </script>
</body>
</html>
